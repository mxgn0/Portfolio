
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFX for IH Motion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease, border-bottom 0.3s ease;
        }
        a:hover {
            color: #ff9900;
            border-bottom: 2px solid #ff9900;
        }
    </style>
</head>
<body>
    <!-- Cursor edit -->
    <div id="cursor-dot"></div>
    <header>
        <h1>VFX Simulation Support for IH Motion</h1>
    </header>

    <section>
        <p>cloud simulation</p>
    </section>

    <section>
        <h2>Cloud Simulation</h2>
        <div class="media-grid">
            <figure>
                <video class="content-video" autoplay muted loop playsinline webkit-playsinline>
                    <source src="images/clouds/untitled4.mp4" type="video/mp4">
                    Dein Browser unterstützt dieses Videoformat nicht.
                </video>
                <figcaption>Car driving through clouds – pass 1</figcaption>
            </figure>
            <figure>
                <video class="content-video" autoplay muted loop playsinline webkit-playsinline>
                    <source src="images/clouds/untitled5.mp4" type="video/mp4">
                    Dein Browser unterstützt dieses Videoformat nicht.
                </video>
                <figcaption>Car driving through clouds – pass 2</figcaption>
            </figure>
            <figure>
                <video class="content-video" autoplay muted loop playsinline webkit-playsinline>
                    <source src="images/clouds/untitled1.mp4" type="video/mp4">
                    Dein Browser unterstützt dieses Videoformat nicht.
                </video>
                <figcaption>Cloud simulation – study 1</figcaption>
            </figure>
            <figure>
                <video class="content-video" autoplay muted loop playsinline webkit-playsinline>
                    <source src="images/clouds/untitled2.mp4" type="video/mp4">
                    Dein Browser unterstützt dieses Videoformat nicht.
                </video>
                <figcaption>Cloud simulation – study 2</figcaption>
            </figure>
            <figure>
                <video class="content-video" autoplay muted loop playsinline webkit-playsinline>
                    <source src="images/clouds/untitled3.mp4" type="video/mp4">
                    Dein Browser unterstützt dieses Videoformat nicht.
                </video>
                <figcaption>Cloud simulation – study 3</figcaption>
            </figure>
        </div>
    </section>

    <section class="project-description">
        <h2>Projektbeschreibung</h2>
        <p class="description-placeholder"></p>
    </section>

    <footer>
        <p><a href="index.html">back</a></p>
    </footer>
<script>
const dot = document.getElementById('cursor-dot');

// Maus folgt
window.addEventListener('mousemove', (e) => {
    dot.style.left = `${e.clientX}px`;
    dot.style.top = `${e.clientY}px`;
    dot.style.opacity = 1; // sobald sich die Maus bewegt, einblenden
});

// Touch-Support
window.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    dot.style.left = `${touch.clientX}px`;
    dot.style.top = `${touch.clientY}px`;
    dot.style.opacity = 1; // sichtbar
}, { passive: true });

window.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    dot.style.left = `${touch.clientX}px`;
    dot.style.top = `${touch.clientY}px`;
}, { passive: true });

window.addEventListener('touchend', () => {
    // nur auf Touch-Geräten ausblenden
    if (window.matchMedia('(pointer: coarse)').matches) {
        dot.style.opacity = 0;
    }
}, { passive: true });

</script>
</body>
</html>
