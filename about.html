<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max Jänichen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease, border-bottom 0.3s ease;
        }
        a:hover {
            color: #ff9900;
            border-bottom: 2px solid #ff9900;
        }

        /* ---------- Ticker: reines schwarz/weiß ---------- */
        :root{
            --ticker-bg: #000000;
            --ticker-rule: #2a2a2a;
            --ticker-dim: #7a7a7a;
            --ticker-faint: #4a4a4a;
            --ticker-hot: #ffffff;
            --ticker-mono: 'JetBrains Mono', ui-monospace, monospace;
        }
        .ticker{
            position: relative;
            width:100%;
            overflow:hidden;
            background: var(--ticker-bg);
            border-top: 1px solid var(--ticker-rule);
            border-bottom: 1px solid var(--ticker-rule);
            padding: 14px 0;
        }
        .ticker::before, .ticker::after{
            content:"";
            position:absolute; top:0; bottom:0; width:80px; z-index:2;
        }
        .ticker::before{ left:0;  background:linear-gradient(90deg, var(--ticker-bg), transparent); }
        .ticker::after { right:0; background:linear-gradient(270deg, var(--ticker-bg), transparent); }
        .marquee-track{
            display:flex;
            width:max-content;
            animation: scroll-left 1200s linear infinite;
        }
        .ticker:hover .marquee-track{ animation-play-state: paused; }
        @keyframes scroll-left{
            from{ transform: translateX(0); }
            to{ transform: translateX(-50%); }
        }
        .tick{
            font-family: var(--ticker-mono);
            font-size: 12.5px;
            letter-spacing: 0.03em;
            color: var(--ticker-dim);
            padding: 0 40px;
            white-space: nowrap;
            border-right: 1px solid var(--ticker-rule);
        }
        .tick.hot{ color: var(--ticker-hot); }
        .tick .dot{ color: var(--ticker-faint); margin-right: 10px; }
        .tick.hot .dot{ color: #999999; }
        @media (prefers-reduced-motion: reduce){
            .marquee-track{ animation: none; }
        }

        /* Inhalt als ruhige, zentrierte Spalte statt links angeklatscht */
        header,
        section,
        footer {
            max-width: 680px;
            margin-left: auto;
            margin-right: auto;
            padding-left: clamp(20px, 5vw, 40px);
            padding-right: clamp(20px, 5vw, 40px);
        }

        /* Portrait bleibt bewusst klein, wird aber auf schmalen Screens responsiv */
        .portrait-img {
            width: 260px;
            max-width: 70%;
            height: auto;
            display: block;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- Ticker -->
    <div class="ticker" role="marquee" aria-label="Statuszeile">
      <div class="marquee-track" id="marqueeTrack"></div>
    </div>

    <!-- Cursor edit -->
    <div id="cursor-dot"></div>
    <header>
        <h1>About</h1>
    </header>
    <section>
        <h2>Max Jänichen</h2>
            <p>(born 1995 in Saxony, Germany)</p>
            <p>is a 3D Artist specialized in procedural simulations, motion design and contemporary art.</p>
    </section>
    <section>
        <h2>Portrait</h2>
        <img class="portrait-img" src="images/IMG_2128.jpg" alt="Portrait of Max Jänichen">
    </section>
    <footer>
        <p><a href="index.html">home</a></p>
    </footer>
<script>
const dot = document.getElementById('cursor-dot');
// Maus folgt
window.addEventListener('mousemove', (e) => {
    dot.style.left = `${e.clientX}px`;
    dot.style.top = `${e.clientY}px`;
    dot.style.opacity = 1; // sobald sich die Maus bewegt, einblenden
});
// Touch-Support
window.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    dot.style.left = `${touch.clientX}px`;
    dot.style.top = `${touch.clientY}px`;
    dot.style.opacity = 1; // sichtbar
}, { passive: true });
window.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    dot.style.left = `${touch.clientX}px`;
    dot.style.top = `${touch.clientY}px`;
}, { passive: true });
window.addEventListener('touchend', () => {
    // nur auf Touch-Geräten ausblenden
    if (window.matchMedia('(pointer: coarse)').matches) {
        dot.style.opacity = 0;
    }
}, { passive: true });

// ---------- Ticker: gewichtete Terme, stark auf Houdini/3D fokussiert ----------
(function(){
  var terms = [
    // -- Houdini core / prozedural — sehr hohes Gewicht --
    { t: "@P += @N * ch('peak')", w: 9 },
    { t: "Attribute Wrangle, run over points", w: 9 },
    { t: "Voronoi Fracture with interior detail", w: 9 },
    { t: "Vellum: more substeps, fewer explosions", w: 9 },
    { t: "Node spaghetti, al dente", w: 8 },
    { t: "Procedural down to the last point", w: 9 },
    { t: "Scatter by density attribute", w: 8 },
    { t: "Seed +1 until it looks right", w: 8 },
    { t: "HDA: promote, lock, ship", w: 7 },
    { t: "PDG cooks while I sleep", w: 8 },
    { t: "TOPs on the night shift", w: 6 },
    { t: "For-Each with feedback, obviously", w: 6 },
    { t: "Group by expression", w: 6 },
    { t: "VOPs for the code-free days", w: 6 },
    { t: "Copy to Points, pack and instance", w: 7 },
    { t: "Boolean Fracture on shatter mode", w: 7 },
    { t: "RBD: glue constraints hold (for now)", w: 7 },
    { t: "Pyro wants more disturbance", w: 7 },
    { t: "FLIP tank, two million particles", w: 7 },
    { t: "Grain Solver on damp sand", w: 6 },
    { t: "Wire Solver under tension", w: 6 },
    { t: "Crowd agents off to work", w: 5 },
    { t: "L-system: premise, rules, growth", w: 6 },
    { t: "Noise on noise on noise", w: 7 },
    { t: "Curvature remapped to color", w: 6 },
    { t: "UV Flatten, seams by hand", w: 6 },
    { t: "Retopo, one polygon at a time", w: 6 },
    { t: "Boolean Union, fingers crossed", w: 6 },
    { t: "Bend, Twist, Taper, regret", w: 5 },
    { t: "KineFX rig from labeled points", w: 5 },
    { t: "Cloth solve, attempt #47", w: 7 },
    { t: "Escape from plugin purgatory", w: 5 },

    // -- Rendering / Look-Dev — hohes Gewicht --
    { t: "Karma XPU eats the GPU", w: 8 },
    { t: "Redshift buckets go brrr", w: 8 },
    { t: "Denoise and pray", w: 6 },
    { t: "Shader graph archaeology", w: 6 },
    { t: "MaterialX node soup", w: 6 },
    { t: "Light rig: key, fill, chaos", w: 5 },
    { t: "One AOV for every doubt", w: 5 },
    { t: "Displacement at render time", w: 6 },
    { t: "Subsurface set to skin", w: 5 },
    { t: "Volumes until the RAM gives up", w: 6 },

    // -- weitere 3D-Tools / Generalist — mittleres Gewicht --
    { t: "TouchDesigner patchwork", w: 6 },
    { t: "Cinema 4D, from memory", w: 4 },
    { t: "Fix it in After Effects", w: 4 },
    { t: "3ds Max flashbacks", w: 3 },
    { t: "Maya rigs on request", w: 3 },
    { t: "Provenance, hashed and stamped", w: 5 },
    { t: "Motion design with proper easing", w: 5 },
    { t: "Real-time budget: 16 ms", w: 4 },
    { t: "Digital materiality, handmade", w: 5 },
    { t: "Chase the emergent detail", w: 6 },
    { t: "Tune the system, not the frame", w: 6 },

    // -- generisches Grundrauschen — sehr niedriges Gewicht --
    { t: "Chudmaxxing", w: 1 },
    { t: "Aura-farming", w: 1 },
    { t: "Redeeming", w: 1 },
    { t: "Clodding", w: 1 },
    { t: "Tokenmaxxing", w: 1 },
    { t: "Slopping", w: 1 },
    { t: "Clanking", w: 1 },
    { t: "Ignoring GPL", w: 1 },
    { t: "Increasing ram prices", w: 1 },
    { t: "Hallucinating", w: 1 },
    { t: "Outsourcing to Mossad", w: 1 },
    { t: "Gemming it up", w: 1 },
    { t: "Absolute coaling", w: 1 },
    { t: "Truth-nuking", w: 1 },
    { t: "Fakecelling", w: 1 },
    { t: "Truecelling", w: 1 },
    { t: "Mogging", w: 1 },
    { t: "Rizzing", w: 1 },
    { t: "Dumbing it down", w: 1 },
    { t: "Enshittifying", w: 1 },
    { t: "Summoning Cheesy Micheal", w: 1 },
    { t: "Degenerating", w: 1 },
    { t: "Running \\\"sudo rm -rf --no-preserve-root /\\\"", w: 1 },
    { t: "Virtual insanitying", w: 1 },
    { t: "Bomboclating", w: 1 },
    { t: "Gambling", w: 1 },
    { t: "Rebooting", w: 1 },
    { t: "Unicycling", w: 1 },
    { t: "Horsing around", w: 1 },
    { t: "Calling Mahoraga", w: 1 },
    { t: "Calling Kevin", w: 1 },
    { t: "Calling Saul", w: 1 },
    { t: "Nuking SF", w: 1 },
    { t: "Spellcasting", w: 1 },
    { t: "Hexing", w: 1 },
    { t: "Prompt-injecting", w: 1 },
    { t: "Installing Windows", w: 1 },
    { t: "Ultrathinking", w: 1 },
    { t: "Nuking prod", w: 1 },
    { t: "Tokenmining", w: 1 },
    { t: "Questioning", w: 1 },
    { t: "Increasing shareholder value", w: 1 },
    { t: "Winging it", w: 1 },
    { t: "Cooking", w: 1 }
  ];

  var HIGH_WEIGHT_THRESHOLD = 6;

  function buildSequence(){
    var expanded = [];
    terms.forEach(function(item){
      for (var i = 0; i < item.w; i++){
        expanded.push(item);
      }
    });
    for (var i = expanded.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = expanded[i]; expanded[i] = expanded[j]; expanded[j] = tmp;
    }
    return expanded;
  }

  function render(){
    var track = document.getElementById('marqueeTrack');
    if (!track) return;
    var seq = buildSequence();
    var html = '';
    for (var pass = 0; pass < 2; pass++){
      seq.forEach(function(item){
        var hot = item.w >= HIGH_WEIGHT_THRESHOLD ? ' hot' : '';
        html += '<span class="tick' + hot + '"><span class="dot">&#9670;</span>' + item.t + '&hellip;</span>';
      });
    }
    track.innerHTML = html;
  }

  render();
})();
</script>
    <script src="lib/nav.js"></script>
</body>
</html>
