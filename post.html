<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MXGN — blog</title>
    <meta name="description" content="MXGN blog post – thoughts, breakdowns & behind the scenes.">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="blog.css">
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>
<body class="blog-page">

    <div id="cursor-dot"></div>

    <div id="readability-toggle" class="readability-toggle">
      x contrast
    </div>

    <header>
        <h1><a href="blog.html">blog</a></h1>
        <p data-i18n="blog-tagline">thoughts, breakdowns &amp; behind the scenes</p>
    </header>

    <main class="blog-wrap">
        <div class="font-controls">
            <button id="font-dec" type="button" aria-label="smaller text" title="smaller text">A&minus;</button>
            <button id="font-inc" type="button" aria-label="larger text" title="larger text">A+</button>
        </div>

        <article id="post-root">
            <p class="blog-note">…</p>
        </article>

        <!-- anonymous comments & likes — rendered by lib/blog.js -->
        <section id="comments-root"></section>
    </main>

    <nav>
        <a href="index.html" data-i18n="nav-overview">portfolio</a>
        <a href="blog.html">blog</a>
        <a href="lab.html">lab</a>
        <a href="play.html">game dev demos</a>
        <a href="Impressum.html">impressum</a>
    </nav>

    <footer>
        <p data-i18n="footer-rights">&copy; 2026 Max Jänichen. All rights reserved.</p>
    </footer>

    <script>
        const dot = document.getElementById('cursor-dot');
        window.addEventListener('mousemove', (e) => {
            dot.style.left = `${e.clientX}px`;
            dot.style.top = `${e.clientY}px`;
            dot.style.opacity = 1;
        });
    </script>
    <script>
      const toggle = document.getElementById('readability-toggle');
      const body = document.body;

      if (localStorage.getItem('readable') === 'true') {
        body.classList.add('readable');
        toggle.textContent = 'o contrast';
      }

      toggle.addEventListener('click', () => {
        body.classList.toggle('readable');
        const isReadable = body.classList.contains('readable');
        localStorage.setItem('readable', isReadable);
        toggle.textContent = isReadable ? 'o contrast' : 'x contrast';
      });
    </script>

    <script>
      // A− / A+: scales the post & comment text via --blog-font-scale,
      // remembered per browser in localStorage.
      (function () {
        var MIN = 0.85, MAX = 1.6, STEP = 0.15;
        var scale = 1;
        try { scale = parseFloat(localStorage.getItem('blog_font_scale')) || 1; } catch (e) {}

        function apply() {
          scale = Math.min(MAX, Math.max(MIN, Math.round(scale * 100) / 100));
          document.documentElement.style.setProperty('--blog-font-scale', scale);
          try { localStorage.setItem('blog_font_scale', scale); } catch (e) {}
        }
        apply();

        document.getElementById('font-dec').addEventListener('click', function () { scale -= STEP; apply(); });
        document.getElementById('font-inc').addEventListener('click', function () { scale += STEP; apply(); });
      })();
    </script>

    <script src="lib/nav.js"></script>
    <script src="lib/i18n.js"></script>
    <script src="lib/blog-posts.js"></script>
    <script src="lib/blog.js"></script>
</body>
</html>
