<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Animation</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .gallery img {
            width: 100%;
            max-width: 600px;
            height: auto;
            border: 2px solid #fff;
            border-radius: 5px;
        }
    </style>
    <style>
        a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease, border-bottom 0.3s ease;
        }
        a:hover {
            color: #ff9900;
            border-bottom: 2px solid #ff9900;
        }
    </style>
</head>
<body class="page-centered">
        <!-- Cursor edit -->
    <div id="cursor-dot"></div>

    <header>
        <h1 data-i18n="med-h1">Medical Animation</h1>
    </header>

    <section>
        <h2>Animation</h2>
        <div class="media-grid">
            <figure>
                <video class="content-video" autoplay muted loop playsinline webkit-playsinline>
                    <source src="images/Preview01_ElectrodeInsertion_2024.mp4" type="video/mp4">
                    Dein Browser unterstützt dieses Videoformat nicht.
                </video>
                <figcaption data-i18n="med-cap-preview">Electrode insertion – preview</figcaption>
            </figure>
            <figure>
                <video class="content-video" autoplay muted loop playsinline webkit-playsinline>
                    <source src="images/Preview10eased_ElectrodeInsertion_2024_Feedback4.mp4" type="video/mp4">
                    Dein Browser unterstützt dieses Videoformat nicht.
                </video>
                <figcaption data-i18n="med-cap-eased">Electrode insertion – eased, feedback pass 4</figcaption>
            </figure>
            <figure>
                <img src="images/Beauty.png"/>
                <figcaption data-i18n="med-cap-beauty">Beauty render</figcaption>
            </figure>
        </div>
    </section>

    <section class="project-description">
        <h2 data-i18n="project-desc">Project description</h2>
        <p class="description-placeholder" data-i18n="med-desc">Ear Implant - Electrode Insertion.</p>
    </section>

    <footer>
        <p><a href="index.html" data-i18n="back-overview">&larr; back to overview</a></p>
    </footer>
    <script>
const dot = document.getElementById('cursor-dot');

// Maus folgt
window.addEventListener('mousemove', (e) => {
    dot.style.left = `${e.clientX}px`;
    dot.style.top = `${e.clientY}px`;
    dot.style.opacity = 1; // sobald sich die Maus bewegt, einblenden
});

// Touch-Support
window.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    dot.style.left = `${touch.clientX}px`;
    dot.style.top = `${touch.clientY}px`;
    dot.style.opacity = 1; // sichtbar
}, { passive: true });

window.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    dot.style.left = `${touch.clientX}px`;
    dot.style.top = `${touch.clientY}px`;
}, { passive: true });

window.addEventListener('touchend', () => {
    // nur auf Touch-Geräten ausblenden
    if (window.matchMedia('(pointer: coarse)').matches) {
        dot.style.opacity = 0;
    }
}, { passive: true });

</script>
    <script src="lib/nav.js"></script>
    <script src="lib/i18n.js"></script>
</body>
</html>
