                            const dh = (hgt[i] - hgt[i + 1]) * k;
                            hgt[i] -= dh;
                            hgt[i + 1] += dh;
                        }
                    }
                    /* hot wax burns off, cool wax slowly re-pours */
                    for (let i = 0; i < n; i++) {
                        hgt[i] += (-heat[i] * heat[i] * h * 0.045 + (1 - heat[i]) * h * 0.006) * dt;
                        hgt[i] = clamp(hgt[i], h * 0.06, h * 0.8);
                    }

                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, w, h);
                    /* wax body */
                    ctx.beginPath();
                    ctx.moveTo(0, h);
                    for (let i = 0; i < n; i++) ctx.lineTo(i * cwx, h - hgt[i]);
                    ctx.lineTo(w, h);
                    ctx.closePath();
                    ctx.fillStyle = '#211f1b';
                    ctx.fill();
                    /* surface line */
                    ctx.beginPath();
                    for (let i = 0; i < n; i++) {
                        const x = i * cwx, y = h - hgt[i];
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                    ctx.strokeStyle = 'rgba(235,228,214,0.45)';
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                    /* molten glow along the surface */
                    ctx.globalCompositeOperation = 'lighter';
                    for (let i = 0; i < n; i += 3) {
                        const hh = heat[i];
                        if (hh < 0.1) continue;
                        const x = i * cwx, y = h - hgt[i];
                        const rad = 4 + hh * 16;
                        const g = ctx.createRadialGradient(x, y, 0, x, y, rad);
                        g.addColorStop(0, `rgba(${(180 + hh * 75) | 0},${(60 + hh * 130) | 0},${(10 + hh * 20) | 0},${(0.5 * hh).toFixed(3)})`);
                        g.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = g;
                        ctx.beginPath();
                        ctx.arc(x, y, rad, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    /* flame */
                    const fy = h - hgt[fi] - 14;
                    const flick = Math.sin(t * 17) * 1.5 + Math.sin(t * 29 + 1);
                    const fg = ctx.createRadialGradient(fx, fy, 0, fx, fy, 16 + flick);
                    fg.addColorStop(0, 'rgba(255,220,120,0.95)');
                    fg.addColorStop(0.4, 'rgba(255,122,24,0.55)');
                    fg.addColorStop(1, 'rgba(255,60,0,0)');
                    ctx.fillStyle = fg;
                    ctx.beginPath();
                    ctx.arc(fx, fy, 16 + flick, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalCompositeOperation = 'source-over';
                }
            };
        }

        /* =====================================================
           15) SNOW — snowfall with drifts
           ===================================================== */
        function snowDrift(w, h, ctx) {
            const N = Math.min(220, Math.round(w * h / 350));
            const flakes = [];
            for (let i = 0; i < N; i++) {
                const r = 0.8 + Math.random() * 1.8;
                flakes.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r,
                    ph: Math.random() * Math.PI * 2,
                    sp: 18 + r * 14
                });
            }
            const gn = Math.ceil(w / 4);
            const g = new Float32Array(gn);
            const bg = ctx.createLinearGradient(0, 0, 0, h);
            bg.addColorStop(0, '#04040a');
            bg.addColorStop(1, '#070a14');

            return {
                step(dt, input) {
                    ctx.fillStyle = bg;
                    ctx.fillRect(0, 0, w, h);

                    for (const f of flakes) {
                        f.ph += dt * (0.6 + f.r * 0.3);
                        let vx = Math.sin(f.ph) * 14 + tilt.x * 60;
                        let vy = f.sp + tilt.y * 30;
                        if (input.active) {
                            const dx = f.x - input.x, dy = f.y - input.y;
                            const d = Math.hypot(dx, dy);
                            const R = Math.min(w, h) * 0.3;
                            if (d < R && d > 0.5) {
                                const push = (1 - d / R) * 160;
                                vx += dx / d * push;
                                vy += dy / d * push * 0.6;
                            }
                        }
                        f.x += vx * dt;
                        f.y += vy * dt;
                        if (f.x < -4) f.x = w + 3;
                        if (f.x > w + 4) f.x = -3;
                        const gi = clamp(Math.floor(f.x / 4), 0, gn - 1);
                        if (f.y >= h - 2 - g[gi]) {
                            g[gi] = Math.min(g[gi] + f.r * 0.9, h * 0.45);
                            f.y = -4;
                            f.x = Math.random() * w;
                        }
                        const sz = f.r < 1.3 ? 1 : 2;
                        ctx.fillStyle = `rgba(240,244,255,${(0.3 + f.r * 0.22).toFixed(2)})`;
                        ctx.fillRect(f.x, f.y, sz, sz);
                    }

                    /* drifts slump smooth, and slowly melt so it never fills up */
                    for (let i = 1; i < gn - 1; i++) {
                        g[i] += ((g[i - 1] + g[i + 1]) / 2 - g[i]) * Math.min(1, dt * 1.5);
                    }
                    const cap = h * 0.32;
                    for (let i = 0; i < gn; i++) {
                        g[i] *= 1 - dt * (0.008 + (g[i] > cap ? 0.06 : 0));
                    }
                    ctx.beginPath();
                    ctx.moveTo(0, h);
                    ctx.lineTo(0, h - g[0]);
                    for (let i = 1; i < gn; i++) ctx.lineTo(i * 4 + 2, h - g[i]);
                    ctx.lineTo(w, h - g[gn - 1]);
                    ctx.lineTo(w, h);
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(222,230,244,0.9)';
                    ctx.fill();
                }
            };
        }

        /* =====================================================
           16) SAND — falling-sand cellular automaton
           ===================================================== */
        function fallingSand(w, h, ctx) {
            const cell = 3;
            const cols = Math.max(24, Math.floor(w / cell));
            const rows = Math.max(24, Math.floor(h / cell));
            const grid = new Uint8Array(cols * rows);
            const WALL = 255;

            function ledge(fx0, fx1, fy) {
                const y = Math.round(rows * fy);
                for (let x = Math.round(cols * fx0); x <= Math.round(cols * fx1); x++) {
                    grid[y * cols + x] = WALL;
                }
            }
            ledge(0.08, 0.45, 0.35);
            ledge(0.55, 0.92, 0.6);

            const off = document.createElement('canvas');
            off.width = cols; off.height = rows;
            const octx = off.getContext('2d');
            const img = octx.createImageData(cols, rows);
            const pal = [
                [0, 0, 0],
                [122, 114, 100], [141, 132, 116], [100, 94, 84],
                [255, 210, 31], [255, 122, 24]
            ];
            const wallCol = [52, 54, 58];
            let t = 0, frame = 0, count = 0, drain = 0;

            function addGrain(cx2, cy2) {
                const x = clamp(Math.round(cx2 + (Math.random() - 0.5) * 4), 1, cols - 2);
                const y = clamp(Math.round(cy2 + (Math.random() - 0.5) * 3), 1, rows - 2);
                const i = y * cols + x;
                if (grid[i] === 0) {
                    const r = Math.random();
                    grid[i] = r < 0.008 ? 4 : r < 0.013 ? 5 : 1 + ((Math.random() * 3) | 0);
                    count++;
                }
            }

            return {
                step(dt, input) {
                    t += dt;
                    frame++;
                    if (input.active) {
                        for (let k = 0; k < 5; k++) addGrain(input.x / cell, input.y / cell);
                    } else {
                        const sx = cols * (0.5 + Math.sin(t * 0.37) * 0.33 + Math.sin(t * 1.4) * 0.06);
                        for (let k = 0; k < 2; k++) addGrain(sx, 2);
                    }
                    if (drain <= 0 && count > cols * rows * 0.42) drain = 4;
                    if (drain > 0) drain -= dt;

                    for (let pass = 0; pass < 2; pass++) {
                        if (drain > 0) {
                            const base = (rows - 1) * cols;
                            for (let x = 0; x < cols; x++) {
                                if (grid[base + x] !== 0 && grid[base + x] !== WALL) {
                                    grid[base + x] = 0;
                                    count--;
                                }
                            }
                        }
                        for (let y = rows - 2; y >= 0; y--) {
                            const ltr = (y + frame + pass) % 2 === 0;
                            const row = y * cols;
                            for (let k = 0; k < cols; k++) {
                                const x = ltr ? k : cols - 1 - k;
                                const i = row + x;
                                const v = grid[i];
                                if (v === 0 || v === WALL) continue;
                                const below = i + cols;
                                if (grid[below] === 0) { grid[below] = v; grid[i] = 0; continue; }
                                const dr = Math.random() < 0.5 ? 1 : -1;
                                if (x + dr > 0 && x + dr < cols - 1 && grid[below + dr] === 0) {
                                    grid[below + dr] = v; grid[i] = 0; continue;
                                }
                                if (x - dr > 0 && x - dr < cols - 1 && grid[below - dr] === 0) {
                                    grid[below - dr] = v; grid[i] = 0;
                                }
                            }
                        }
                    }

                    const d = img.data;
                    for (let i = 0; i < cols * rows; i++) {
                        const v = grid[i];
                        const c = v === WALL ? wallCol : pal[v];
                        d[i * 4] = c[0]; d[i * 4 + 1] = c[1]; d[i * 4 + 2] = c[2]; d[i * 4 + 3] = 255;
                    }
                    octx.putImageData(img, 0, 0);
                    ctx.imageSmoothingEnabled = false;
                    ctx.drawImage(off, 0, 0, w, h);
                }
            };
        }

        /* =====================================================
           17) PYRO BURST — shockwave, fireball, debris, smoke
           ===================================================== */
        function pyroBurst(w, h, ctx) {
            const S = Math.min(w, h);
            const parts = [], rings = [], debris = [];
            let auto = 1.5, wasDown = false, shake = 0;

            function boom(x, y) {
                shake = 1;
                rings.push({ x, y, r: 3, a: 0.9 });
                for (let i = 0; i < 60; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const sp = S * (0.2 + Math.random() * 1.1) * (0.3 + Math.random() * 0.7);
                    parts.push({
                        x: x + (Math.random() - 0.5) * 6,
                        y: y + (Math.random() - 0.5) * 6,
                        vx: Math.cos(a) * sp,
                        vy: Math.sin(a) * sp * 0.85,
                        age: Math.random() * 0.08,
                        life: 0.6 + Math.random() * 1.2,
                        r: 2.5 + Math.random() * 5
                    });
                }
                for (let i = 0; i < 14; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const sp = S * (1.0 + Math.random() * 1.4);
                    debris.push({
                        x, y,
                        vx: Math.cos(a) * sp,
                        vy: Math.sin(a) * sp - sp * 0.15,
                        age: 0,
                        life: 0.5 + Math.random() * 0.7
                    });
                }
            }

            return {
                step(dt, input) {
                    if (input.down && !wasDown && input.active) { boom(input.x, input.y); auto = 5 + Math.random() * 3; }
                    wasDown = input.down;
                    auto -= dt;
                    if (auto <= 0) {
                        boom(w * (0.25 + Math.random() * 0.5), h * (0.2 + Math.random() * 0.5));
                        auto = 3.5 + Math.random() * 3.5;
                    }

                    shake = Math.max(0, shake - dt * 2.6);
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(0, 0, w, h);

                    ctx.save();
                    if (shake > 0.01) {
                        ctx.translate((Math.random() - 0.5) * 7 * shake, (Math.random() - 0.5) * 7 * shake);
                    }

                    for (let i = parts.length - 1; i >= 0; i--) {
                        const p = parts[i];
                        p.age += dt;
                        if (p.age >= p.life) { parts.splice(i, 1); continue; }
                        const k = p.age / p.life;
                        p.vx *= 1 - 2.4 * dt;
                        p.vy *= 1 - 2.4 * dt;
                        p.vy -= S * 0.5 * dt * k;
                        p.x += p.vx * dt;
                        p.y += p.vy * dt;
                    }
                    /* smoke pass */
                    for (const p of parts) {
                        const k = p.age / p.life;
                        if (k <= 0.45) continue;
                        const u = (k - 0.45) / 0.55;
                        ctx.fillStyle = `rgba(64,60,57,${(0.18 * (1 - u)).toFixed(3)})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r * (1 + u * 2.4), 0, Math.PI * 2);
                        ctx.fill();
                    }
                    /* fire pass */
                    ctx.globalCompositeOperation = 'lighter';
                    for (const p of parts) {
                        const k = p.age / p.life;
                        if (k > 0.6) continue;
                        const u = k / 0.6;
                        let r, gc, bc;
                        if (u < 0.25) { r = 255; gc = 235; bc = 160; }
                        else if (u < 0.55) { r = 255; gc = 150; bc = 40; }
                        else { r = 216; gc = 48; bc = 38; }
                        ctx.fillStyle = `rgba(${r},${gc},${bc},${(0.5 * (1 - u) + 0.2).toFixed(3)})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r * (1 - u * 0.4), 0, Math.PI * 2);
                        ctx.fill();
                    }
                    /* debris streaks */
                    ctx.lineWidth = 1.2;
                    for (let i = debris.length - 1; i >= 0; i--) {
                        const db = debris[i];
                        db.age += dt;
                        if (db.age >= db.life) { debris.splice(i, 1); continue; }
                        db.vy += S * 2.4 * dt;
                        db.x += db.vx * dt;
                        db.y += db.vy * dt;
                        const k = 1 - db.age / db.life;
                        ctx.strokeStyle = `rgba(255,170,60,${(0.7 * k).toFixed(3)})`;
                        ctx.beginPath();
                        ctx.moveTo(db.x - db.vx * 0.02, db.y - db.vy * 0.02);
                        ctx.lineTo(db.x, db.y);
                        ctx.stroke();
                    }
                    /* shockwave rings */
                    ctx.lineWidth = 2;
                    for (let i = rings.length - 1; i >= 0; i--) {
                        const rg = rings[i];
                        rg.r += S * 2.6 * dt;
                        rg.a -= 2.4 * dt;
                        if (rg.a <= 0) { rings.splice(i, 1); continue; }
                        ctx.strokeStyle = `rgba(255,190,90,${rg.a.toFixed(3)})`;
                        ctx.beginPath();
                        ctx.arc(rg.x, rg.y, rg.r, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    ctx.restore();
                    ctx.globalCompositeOperation = 'source-over';
                }
            };
        }

        /* =====================================================
           18) HARD SURFACE — greebled hull plating
           ===================================================== */
        function hardSurface(w, h, ctx) {
            const panels = [];
            const types = ['plain', 'plain', 'plain', 'vent', 'dots', 'bar', 'light'];
            function newPanel(x, y, pw, ph) {
                panels.push({
                    x, y, w: pw, h: ph,
                    tone: 0.05 + Math.random() * 0.07,
                    type: types[(Math.random() * types.length) | 0],
                    ph: Math.random() * Math.PI * 2,
                    acc: Math.random() < 0.1
                });
            }
            function subdivide(x, y, pw, ph, depth) {
                const minS = Math.min(w, h) * 0.16;
                if (depth > 0 && (pw > minS * 1.8 || ph > minS * 1.8 ||
                    (pw > minS && ph > minS && Math.random() < 0.45))) {
                    const k = 0.32 + Math.random() * 0.36;
                    if (pw > ph) {
                        subdivide(x, y, pw * k, ph, depth - 1);
                        subdivide(x + pw * k, y, pw * (1 - k), ph, depth - 1);
                    } else {
                        subdivide(x, y, pw, ph * k, depth - 1);
                        subdivide(x, y + ph * k, pw, ph * (1 - k), depth - 1);
                    }
                } else {
                    newPanel(x, y, pw, ph);
                }
            }
            subdivide(0, 0, w, h, 5);
            let t = 0, scanX = -60;

            return {
                step(dt, input) {
                    t += dt;
                    scanX += dt * w * 0.14;
                    if (scanX > w + 80) scanX = -80;
                    ctx.fillStyle = '#030303';
                    ctx.fillRect(0, 0, w, h);
                    ctx.lineWidth = 1;

                    for (const p of panels) {
                        const scanK = Math.max(0, 1 - Math.abs((p.x + p.w / 2) - scanX) / 80);
                        /* the scanline occasionally rebuilds the panel it passes */
                        if (scanK > 0.92 && Math.random() < dt * 3) {
                            p.tone = 0.05 + Math.random() * 0.07;
                            p.type = types[(Math.random() * types.length) | 0];
                            p.acc = Math.random() < 0.1;
                            p.ph = Math.random() * Math.PI * 2;
                        }
                        const hover = input.active &&
                            input.x >= p.x && input.x < p.x + p.w &&
                            input.y >= p.y && input.y < p.y + p.h;
                        const gc = Math.round((p.tone + scanK * 0.05 + (hover ? 0.05 : 0)) * 255);
                        ctx.fillStyle = `rgb(${gc},${gc},${gc + 3})`;
                        ctx.fillRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
                        ctx.strokeStyle = hover ? ACC.orange : `rgba(255,255,255,${(0.05 + scanK * 0.12).toFixed(3)})`;
                        ctx.strokeRect(p.x + 1.5, p.y + 1.5, p.w - 3, p.h - 3);

                        const seed = p.ph;
                        if (p.type === 'vent' && p.w > 22 && p.h > 16) {
                            const nv = 2 + ((seed * 5) | 0) % 3;
                            ctx.strokeStyle = 'rgba(0,0,0,0.55)';
                            for (let i = 1; i <= nv; i++) {
                                const yy = p.y + p.h * i / (nv + 1);
                                ctx.beginPath();
                                ctx.moveTo(p.x + 6, yy);
                                ctx.lineTo(p.x + p.w - 6, yy);
                                ctx.stroke();
                            }
                        } else if (p.type === 'dots' && p.w > 18 && p.h > 14) {
                            const nd = 2 + ((seed * 7) | 0) % 3;
                            ctx.fillStyle = 'rgba(255,255,255,0.18)';
                            for (let i = 0; i < nd; i++) {
                                ctx.beginPath();
                                ctx.arc(p.x + 7 + i * 7, p.y + p.h - 7, 1.6, 0, Math.PI * 2);
                                ctx.fill();
                            }
                        } else if (p.type === 'bar' && p.w > 20) {
                            ctx.fillStyle = 'rgba(255,255,255,0.10)';
                            ctx.fillRect(p.x + 4, p.y + 4, p.w - 8, 3);
                        } else if (p.type === 'light') {
                            const blink = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t * 1.7 + seed * 5));
                            ctx.fillStyle = p.acc
                                ? `rgba(182,255,46,${blink.toFixed(3)})`
                                : `rgba(255,122,24,${blink.toFixed(3)})`;
                            ctx.fillRect(p.x + p.w - 10, p.y + 5, 5, 3);
                        }
                    }
                    /* scanline */
                    const grad = ctx.createLinearGradient(scanX - 40, 0, scanX + 40, 0);
                    grad.addColorStop(0, 'rgba(255,122,24,0)');
                    grad.addColorStop(0.5, 'rgba(255,122,24,0.10)');
                    grad.addColorStop(1, 'rgba(255,122,24,0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(scanX - 40, 0, 80, h);
                    ctx.fillStyle = 'rgba(255,160,70,0.35)';
                    ctx.fillRect(scanX, 0, 1, h);
                }
            };
        }

        /* =====================================================
           19) ABSTRACT GROWTH — space colonization
           ===================================================== */
        function growthColonize(w, h, ctx) {
            const S = Math.min(w, h);
            const INF2 = Math.pow(S * 0.42, 2), KILL2 = 81;
            const STEP = Math.max(4, S * 0.02);
            let atts, nodes, doneAt, fade, stuck, t = 0, acc = 0;

            function reset() {
                atts = [];
                for (let i = 0; i < 130; i++) {
                    atts.push({ x: w * (0.06 + Math.random() * 0.88), y: h * (0.04 + Math.random() * 0.74) });
                }
                nodes = [{ x: w / 2, y: h - 5, px: -1, py: -1, born: t }];
                doneAt = 0; fade = 1; stuck = 0;
            }
            reset();

            return {
                step(dt, input) {
                    t += dt;
                    /* hovering sows extra attractors — it grows toward you */
                    if (input.active && !doneAt && atts.length < 260 && Math.random() < dt * 20) {
                        atts.push({
                            x: clamp(input.x + (Math.random() - 0.5) * 60, 4, w - 4),
                            y: clamp(input.y + (Math.random() - 0.5) * 60, 4, h - 4)
                        });
                    }
                    acc += dt;
                    if (acc > 0.035 && !doneAt) {
                        acc = 0;
                        const pull = new Map();
                        for (let ai = atts.length - 1; ai >= 0; ai--) {
                            const a = atts[ai];
                            let best = -1, bd2 = INF2;
                            for (let ni = 0; ni < nodes.length; ni++) {
                                const dx = a.x - nodes[ni].x, dy = a.y - nodes[ni].y;
                                const d2 = dx * dx + dy * dy;
                                if (d2 < bd2) { bd2 = d2; best = ni; }
                            }
                            if (best < 0) continue;
                            if (bd2 < KILL2) { atts.splice(ai, 1); continue; }
                            const nd = nodes[best];
                            const dd = Math.sqrt(bd2);
                            let e = pull.get(best);
                            if (!e) { e = [0, 0]; pull.set(best, e); }
                            e[0] += (a.x - nd.x) / dd;
                            e[1] += (a.y - nd.y) / dd;
                        }
                        let grew = false;
                        for (const [ni, e] of pull) {
                            if (nodes.length > 820) break;
                            const nd = nodes[ni];
                            const dl = Math.hypot(e[0], e[1]);
                            if (dl < 0.01) continue;
                            nodes.push({
                                x: nd.x + e[0] / dl * STEP + (Math.random() - 0.5) * 1.4,
                                y: nd.y + e[1] / dl * STEP + (Math.random() - 0.5) * 1.4,
                                px: nd.x, py: nd.y, born: t
                            });
                            grew = true;
                        }
                        stuck = grew ? 0 : stuck + 1;
                        if (nodes.length > 820 || atts.length < 3 || stuck > 40) doneAt = t;
                    }
                    if (doneAt && t - doneAt > 2.5) {
                        fade -= dt * 0.7;
                        if (fade <= 0) reset();
                    }

                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, w, h);
                    ctx.globalAlpha = clamp(fade, 0, 1);
                    ctx.fillStyle = 'rgba(182,255,46,0.10)';
                    for (const a of atts) ctx.fillRect(a.x, a.y, 1.5, 1.5);
                    for (const nd of nodes) {
                        if (nd.px < 0) continue;
                        const age = t - nd.born;
                        if (age < 1.4) {
                            const k = 1 - age / 1.4;
                            ctx.strokeStyle = `rgba(182,255,46,${(0.3 + 0.7 * k).toFixed(3)})`;
                            ctx.lineWidth = 1.5;
                        } else {
                            ctx.strokeStyle = 'rgba(205,210,198,0.30)';
                            ctx.lineWidth = 1;
                        }
                        ctx.beginPath();
                        ctx.moveTo(nd.px, nd.py);
                        ctx.lineTo(nd.x, nd.y);
                        ctx.stroke();
                        if (age < 0.4) {
                            ctx.fillStyle = ACC.lime;
                            ctx.fillRect(nd.x - 1, nd.y - 1, 2.5, 2.5);
                        }
                    }
                    ctx.globalAlpha = 1;
                }
            };
        }

        /* ---------- boot ---------- */
        const factories = {
            sparks: sparkSurge,
            flow: flowField,
            lattice: dotLattice,
            parallax: parallaxRidge,
            ripple: ripplePool,
            boids: boids,
            arc: arcGap,
            pendulum: doublePendulum,
            ik: ikChain,
            rbd: rbdWall,
            softbody: softBody,
            cloth: vellumCloth,
            lava: lavaLamp,
            wax: meltingWax,
            snow: snowDrift,
            sand: fallingSand,
            pyro: pyroBurst,
            hardsurface: hardSurface,
            growth: growthColonize
        };

        let fsTile = null; /* while one tile is fullscreen, only that one animates */

        document.querySelectorAll('canvas[data-sim]').forEach(cv => {
            const f = factories[cv.dataset.sim];
            if (!f) return;
            const tile = makeTile(cv, f);
            io.observe(cv);

            /* fullscreen toggle: native fullscreen where available,
               fixed-overlay fallback everywhere else (iphone/safari) */
            const fig = cv.closest('.tile');
            const btn = document.createElement('button');
            btn.className = 'fs-btn';
            btn.textContent = '⛶';
            btn.setAttribute('aria-label', 'fullscreen');
            fig.appendChild(btn);

            function enterFs() {
                fig.classList.add('fs');
                document.body.classList.add('no-scroll');
                btn.textContent = '✕';
                fsTile = tile;
                if (fig.requestFullscreen) fig.requestFullscreen().catch(() => {});
            }
            function exitFs() {
                fig.classList.remove('fs');
                document.body.classList.remove('no-scroll');
                btn.textContent = '⛶';
                if (fsTile === tile) fsTile = null;
                if (document.fullscreenElement === fig) document.exitFullscreen().catch(() => {});
            }
            btn.addEventListener('click', () => {
                fig.classList.contains('fs') ? exitFs() : enterFs();
            });
            /* leaving native fullscreen (esc / swipe) also drops the overlay */
            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement && fig.classList.contains('fs')) exitFs();
            });
        });

        let last = performance.now();
        function loop(now) {
            const dt = Math.min(0.05, (now - last) / 1000);
            last = now;
            for (const t of tiles) {
                if (fsTile && t !== fsTile) continue;
                if (t.visible && t.sim) t.sim.step(dt, t.input);
            }
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    })();
    </script>

    <script>
        /* site cursor dot */
        const dot = document.getElementById('cursor-dot');
        window.addEventListener('mousemove', (e) => {
            dot.style.left = `${e.clientX}px`;
            dot.style.top = `${e.clientY}px`;
            dot.style.opacity = 1;
        });
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('mouseenter', () => dot.classList.add('rotate'));
            el.addEventListener('mouseleave', () => dot.classList.remove('rotate'));
        });
    </script>
    <script src="lib/nav.js"></script>
</body>
</html>
