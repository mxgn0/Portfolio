<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>lab</title>
    <meta name="description" content="lab – interactive visual code experiments: simulations, dynamics, softbodies, cloth, pyro, sand & procedural growth">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding-top: 60px;
            background-color: #000;
            color: #fff;
            min-height: 100vh;
        }

        /* subtle animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 15% 85%, rgba(255, 122, 24, 0.04), transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(47, 107, 255, 0.04), transparent 45%),
                radial-gradient(circle at 55% 55%, rgba(139, 92, 246, 0.03), transparent 40%),
                #000;
            animation: drift 18s ease-in-out infinite alternate;
        }

        @keyframes drift {
            0%   { background-position: 0% 0%, 0% 0%, 0% 0%; }
            100% { background-position: 6% -4%, -5% 6%, 4% 4%; }
        }

        header {
            text-align: center;
            padding: 10px;
        }

        header h1 {
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin: 0;
        }

        header h1 a {
            color: #fff;
            text-decoration: none;
        }

        header p {
            text-transform: uppercase;
            opacity: 0.8;
        }

        a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #ff9900;
        }

        .lab {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .tiles {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 14px;
            margin-top: 14px;
        }

        @media (min-width: 700px) {
            .tiles {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1000px) {
            .tiles {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .lab h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 46px 0 0;
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.26em;
            opacity: 0.85;
        }

        .lab section:first-of-type h2 {
            margin-top: 10px;
        }

        .lab h2::before {
            content: '';
            width: 8px;
            height: 8px;
            flex: 0 0 auto;
            background: var(--acc, #ff9900);
        }

        .tile {
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.18);
            overflow: hidden;
            transition: border-color 0.25s ease;
            margin: 0;
        }

        .tile:hover {
            border-color: #ff9900;
        }

        .tile canvas {
            display: block;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
            touch-action: pan-y; /* vertical scroll still works on phones */
        }

        /* arc gap needs real multi-touch, so no scroll gestures on its canvas */
        .tile canvas[data-sim="arc"] {
            touch-action: none;
        }

        /* fullscreen toggle per tile */
        .fs-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            z-index: 5;
            width: 30px;
            height: 30px;
            padding: 0;
            font-size: 15px;
            line-height: 1;
            color: #fff;
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0.55;
            transition: opacity 0.2s ease, border-color 0.2s ease;
        }

        .fs-btn:hover {
            opacity: 1;
            border-color: #ff9900;
        }

        /* fullscreen tile: native fullscreen where supported,
           fixed overlay as fallback (iphone) — both use this class */
        .tile.fs {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            background: #000;
            border: none;
        }

        .tile.fs canvas {
            aspect-ratio: auto;
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
            height: auto;
            touch-action: none;
        }

        .tile.fs figcaption {
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        }

        body.no-scroll {
            overflow: hidden;
        }

        .tile figcaption {
            font-size: 0.7rem;
            font-weight: 500;
            line-height: 1.45;
            opacity: 0.7;
            padding: 8px 10px 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
        }

        .tile figcaption strong {
            display: block;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.66rem;
            opacity: 0.95;
            margin-bottom: 2px;
        }

        .hint {
            margin-top: 28px;
            font-size: 0.85rem;
            opacity: 0.6;
            text-align: center;
        }

        .tilt-btn {
            position: fixed;
            bottom: 18px;
            right: 18px;
            z-index: 1002;
            display: none;
            padding: 8px 14px;
            font-family: inherit;
            font-size: 0.75rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        nav {
            text-align: center;
            margin: 40px 0 20px;
        }

        footer {
            text-align: center;
            padding-bottom: 24px;
        }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>

    <header>
        <h1><a href="index.html">lab</a></h1>
        <p>visual lab - code experiments</p>
    </header>

    <main class="lab">
        <section style="--acc:#2f6bff">
            <h2>fields</h2>
            <div class="tiles">

                <figure class="tile">
                    <canvas data-sim="sparks"></canvas>
                    <figcaption><strong>spark surge</strong>
                        a cpu-load visualisation. hover or touch near the core to push the load up —
                        at full load the sparks run red-hot, fast, and split into little offshoot sparks.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="flow"></canvas>
                    <figcaption><strong>flow field</strong>
                        a few hundred particles riding an invisible, slowly turning wind field.
                        drag through it with cursor or finger to blow them off course.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="lattice"></canvas>
                    <figcaption><strong>dot lattice</strong>
                        a grid of points held in place by springs. the cursor bends the field,
                        tilting your phone shifts the whole lattice.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="parallax"></canvas>
                    <figcaption><strong>parallax ridge</strong>
                        layered depth — stars, moon and ridgelines move at different speeds.
                        move the cursor across it or tilt your phone.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="ripple"></canvas>
                    <figcaption><strong>ripple pool</strong>
                        a small wave-equation simulation. touch the surface to drop waves in —
                        and every now and then it rains on its own.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="boids"></canvas>
                    <figcaption><strong>boids</strong>
                        a tiny flock following three rules: separate, align, cohere.
                        your cursor is the predator — they scatter orange when fleeing.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="arc"></canvas>
                    <figcaption><strong>arc gap</strong>
                        high-voltage arcs jumping a spark gap — ported from a server-monitoring
                        dashboard where this visualised cpu load (green &rarr; amber &rarr; red).
                        hover to ground the arc on your cursor; put two or more fingers down
                        and they become the poles.
                    </figcaption>
                </figure>

            </div>
        </section>

        <section style="--acc:#b6ff2e">
            <h2>dynamics</h2>
            <div class="tiles">

                <figure class="tile">
                    <canvas data-sim="pendulum"></canvas>
                    <figcaption><strong>double pendulum</strong>
                        two joints, pure chaos. the outer bob traces its path in green —
                        grab it, drag it around and let go.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="ik"></canvas>
                    <figcaption><strong>kinefx ik</strong>
                        a 12-joint chain solved with fabrik inverse kinematics every frame.
                        the rig chases your cursor — or its own idle target when you're away.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="rbd"></canvas>
                    <figcaption><strong>rbd wall</strong>
                        a brick wall waiting for demolition. click or tap to set off a charge —
                        the pieces take the impulse, tumble, settle, and the wall re-stacks itself.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="softbody"></canvas>
                    <figcaption><strong>softbody</strong>
                        a pressure softbody: a ring of verlet points, springs and internal gas
                        pressure. poke it, shove it across the floor, tilt your phone.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="cloth"></canvas>
                    <figcaption><strong>vellum cloth</strong>
                        cloth pinned along the top edge — verlet constraints and a bit of wind.
                        drag hard enough and the stitches tear; it re-sews itself when shredded.
                    </figcaption>
                </figure>

            </div>
        </section>

        <section style="--acc:#ff7a18">
            <h2>matter</h2>
            <div class="tiles">

                <figure class="tile">
                    <canvas data-sim="lava"></canvas>
                    <figcaption><strong>lava</strong>
                        metaball lava — heat rises, cool blobs sink back into the melt pool.
                        hold your cursor on a blob to heat it up.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="wax"></canvas>
                    <figcaption><strong>wax</strong>
                        a flame wandering over a wax surface. wherever it lingers the wax melts,
                        levels out and glows — steer the flame with your cursor.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="snow"></canvas>
                    <figcaption><strong>snow</strong>
                        snowfall with accumulation: flakes settle into drifts that slump and
                        smooth over time. push the wind around with your cursor.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="sand"></canvas>
                    <figcaption><strong>sand</strong>
                        a falling-sand cellular automaton. pour with your finger, let it pile up
                        on the ledges — when it gets too full, the floor drains.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="pyro"></canvas>
                    <figcaption><strong>pyro burst</strong>
                        shockwave, fireball, debris, smoke. tap anywhere to detonate —
                        or just wait, it likes to go off on its own.
                    </figcaption>
                </figure>

            </div>
        </section>

        <section style="--acc:#8b5cf6">
            <h2>procedural</h2>
            <div class="tiles">

                <figure class="tile">
                    <canvas data-sim="hardsurface"></canvas>
                    <figcaption><strong>hard surface</strong>
                        procedurally panelled hull plating, greeble style. a scanline sweeps
                        the surface and rebuilds panels as it passes — hover to inspect one.
                    </figcaption>
                </figure>

                <figure class="tile">
                    <canvas data-sim="growth"></canvas>
                    <figcaption><strong>abstract growth</strong>
                        space-colonization growth: branches reach for invisible attractor points,
                        tips glow while they grow. hover to feed it — it regrows when done.
                    </figcaption>
                </figure>

            </div>
        </section>

        <p class="hint">everything on this page is live code — no video files. hover, touch, drag or tilt — ⛶ goes fullscreen.</p>
    </main>

    <button class="tilt-btn" id="tilt-btn">enable tilt</button>

    </nav>

    <script>
    (function () {
        'use strict';

        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

        /* accent palette — mostly monochrome sims with loud accents */
        const ACC = {
            lime:   '#b6ff2e',
            orange: '#ff7a18',
            violet: '#8b5cf6',
            red:    '#e0243a',
            blue:   '#2f6bff',
            yellow: '#ffd21f'
        };

        /* ---------- global gyro input ---------- */
        const tilt = { x: 0, y: 0, active: false };

        function onOrientation(e) {
            if (e.gamma === null || e.gamma === undefined) return;
            // gamma: left/right, beta: front/back (holding ~45° is "neutral")
            tilt.x = clamp(e.gamma / 30, -1, 1);
            tilt.y = clamp((e.beta - 45) / 30, -1, 1);
            tilt.active = true;
        }

        const tiltBtn = document.getElementById('tilt-btn');
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function') {
            // iOS needs an explicit user gesture
            tiltBtn.style.display = 'block';
            tiltBtn.addEventListener('click', () => {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        window.addEventListener('deviceorientation', onOrientation);
                        tiltBtn.style.display = 'none';
                    }
                }).catch(() => {});
            });
        } else {
            window.addEventListener('deviceorientation', onOrientation);
        }

        /* ---------- tile framework ---------- */
        const tiles = [];

        function makeTile(canvas, factory) {
            const ctx = canvas.getContext('2d');
            /* pointers: all currently pressed pointers (fingers / mouse button) by id */
            const input = { x: -1e4, y: -1e4, active: false, down: false, pointers: new Map() };

            function setPointer(e) {
                const r = canvas.getBoundingClientRect();
                input.x = e.clientX - r.left;
                input.y = e.clientY - r.top;
                input.active = true;
                if (input.pointers.has(e.pointerId)) {
                    const p = input.pointers.get(e.pointerId);
                    p.x = input.x; p.y = input.y;
                }
            }
            canvas.addEventListener('pointermove', setPointer);
            canvas.addEventListener('pointerdown', (e) => {
                const r = canvas.getBoundingClientRect();
                input.pointers.set(e.pointerId, { x: e.clientX - r.left, y: e.clientY - r.top });
                setPointer(e);
                input.down = true;
            });
            window.addEventListener('pointerup', (e) => {
                input.pointers.delete(e.pointerId);
                input.down = input.pointers.size > 0;
            });
            canvas.addEventListener('pointerleave', (e) => {
                input.pointers.delete(e.pointerId);
                input.active = false;
                input.down = input.pointers.size > 0;
            });
            canvas.addEventListener('pointercancel', (e) => {
                input.pointers.delete(e.pointerId);
                input.active = false;
                input.down = input.pointers.size > 0;
            });

            const tile = { canvas, ctx, input, sim: null, w: 0, h: 0, visible: false };

            function resize() {
                const r = canvas.getBoundingClientRect();
                if (r.width < 4 || r.height < 4) return;
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                tile.w = r.width;
                tile.h = r.height;
                canvas.width = Math.round(r.width * dpr);
                canvas.height = Math.round(r.height * dpr);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, tile.w, tile.h);
                tile.sim = factory(tile.w, tile.h, ctx);
            }

            if (typeof ResizeObserver !== 'undefined') {
                let firstRO = true;
                new ResizeObserver(() => {
                    if (firstRO) { firstRO = false; resize(); return; }
                    // debounce re-inits while dragging the window
                    clearTimeout(tile._rt);
                    tile._rt = setTimeout(resize, 150);
                }).observe(canvas);
            } else {
                resize();
                window.addEventListener('resize', () => { clearTimeout(tile._rt); tile._rt = setTimeout(resize, 150); });
            }

            tiles.push(tile);
            return tile;
        }

        /* only animate tiles that are on screen */
        const io = new IntersectionObserver((entries) => {
            for (const en of entries) {
                const t = tiles.find(t => t.canvas === en.target);
                if (t) t.visible = en.isIntersecting;
            }
        }, { rootMargin: '100px' });

        /* =====================================================
           1) SPARK SURGE — cpu load visualisation
           ===================================================== */
        function sparkSurge(w, h, ctx) {
            const cx = w / 2, cy = h * 0.55;
            const sparks = [];
            let load = 0.2, t = 0;

            function emit(x, y, sp, depth, L) {
                const a = Math.random() * Math.PI * 2;
                sparks.push({
                    x, y,
                    vx: Math.cos(a) * sp,
                    vy: Math.sin(a) * sp - sp * 0.25,
                    age: 0,
                    life: 0.4 + Math.random() * 0.8,
                    depth,
                    hue: 45 - 42 * L + (Math.random() * 12 - 6)
                });
            }

            return {
                step(dt, input) {
                    t += dt;

                    /* target load: idle hum + pointer proximity + tilt */
                    let target = 0.16 + 0.08 * Math.sin(t * 0.6) + 0.05 * Math.sin(t * 1.7);
                    if (input.active) {
                        const d = Math.hypot(input.x - cx, input.y - cy);
                        target = Math.max(target, 1 - clamp(d / (Math.min(w, h) * 0.55), 0, 1));
                    }
                    if (tilt.active) {
                        target = clamp(target + Math.min(0.5, Math.hypot(tilt.x, tilt.y) * 0.55), 0, 1);
                    }
                    load += (target - load) * Math.min(1, dt * 2.5);
                    const L = clamp(load, 0, 1);

                    /* emission: more + faster with load */
                    let n = (14 + 340 * L * L) * dt;
                    while (n > 0 && sparks.length < 900) {
                        if (Math.random() < n) {
                            emit(cx, cy, (30 + 300 * L) * (0.4 + Math.random() * 0.9), 0, L);
                        }
                        n -= 1;
                    }

                    /* integrate + offshoots */
                    for (let i = sparks.length - 1; i >= 0; i--) {
                        const s = sparks[i];
                        s.age += dt;
                        if (s.age >= s.life) { sparks.splice(i, 1); continue; }
                        s.vy += 130 * dt;                 // gravity
                        s.vx += tilt.x * 90 * dt;         // tilt blows sparks sideways
                        s.vx *= (1 - 0.6 * dt);
                        s.vy *= (1 - 0.3 * dt);
                        s.x += s.vx * dt;
                        s.y += s.vy * dt;
                        /* at high load sparks split into offshoots */
                        if (s.depth < 2 && sparks.length < 880 && Math.random() < L * L * dt * 7) {
                            emit(s.x, s.y, Math.hypot(s.vx, s.vy) * 0.6, s.depth + 1, L);
                        }
                    }

                    /* render */
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.fillStyle = `rgba(0,0,0,${0.34 - 0.14 * L})`;
                    ctx.fillRect(0, 0, w, h);

                    ctx.globalCompositeOperation = 'lighter';
                    ctx.lineWidth = 1.2;
                    for (const s of sparks) {
                        const k = 1 - s.age / s.life;
                        ctx.strokeStyle = `hsla(${s.hue},100%,${55 + 15 * k}%,${0.75 * k})`;
                        ctx.beginPath();
                        ctx.moveTo(s.x - s.vx * 0.03, s.y - s.vy * 0.03);
                        ctx.lineTo(s.x, s.y);
                        ctx.stroke();
                    }

                    /* core */
                    const R = 5 + 11 * L + Math.sin(t * (4 + 14 * L)) * 1.5;
                    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 3);
                    g.addColorStop(0, `hsla(${45 - 42 * L},100%,${65 + 15 * L}%,0.9)`);
                    g.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(cx, cy, R * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            };
        }

        /* =====================================================
           2) FLOW FIELD — particles in a turning wind field
           ===================================================== */
        function flowField(w, h, ctx) {
            const N = Math.min(650, Math.round(w * h / 900));
            const pts = [];
            for (let i = 0; i < N; i++) {
                pts.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    sp: 40 + Math.random() * 70,
                    col: Math.random() < 0.1
                        ? 'rgba(182,255,46,0.85)'
                        : `rgba(210,214,220,${(0.25 + Math.random() * 0.4).toFixed(2)})`
                });
            }
            let t = 0;
            const angle = (x, y) =>
                (Math.sin(x * 0.008 + t * 0.4) +
                 Math.cos(y * 0.010 - t * 0.3) +
                 Math.sin((x + y) * 0.004 + t * 0.15)) * 1.7;

            return {
                step(dt, input) {
                    t += dt;
                    ctx.fillStyle = 'rgba(0,0,0,0.06)';
                    ctx.fillRect(0, 0, w, h);
                    ctx.lineWidth = 1.2;

                    const R = Math.min(w, h) * 0.35;
                    for (const p of pts) {
                        const a = angle(p.x, p.y);
                        let vx = Math.cos(a) * p.sp + tilt.x * 50;
                        let vy = Math.sin(a) * p.sp + tilt.y * 50;
                        if (input.active) {
                            const dx = p.x - input.x, dy = p.y - input.y;
                            const d = Math.hypot(dx, dy);
                            if (d < R && d > 0.5) {
                                const f = (1 - d / R) * 210;
                                vx += (dx / d) * f;
                                vy += (dy / d) * f;
                            }
                        }
                        const nx = p.x + vx * dt, ny = p.y + vy * dt;
                        ctx.strokeStyle = p.col;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(nx, ny);
                        ctx.stroke();
                        p.x = nx; p.y = ny;
                        if (p.x < -5) p.x = w + 4; else if (p.x > w + 5) p.x = -4;
                        if (p.y < -5) p.y = h + 4; else if (p.y > h + 5) p.y = -4;
                        if (Math.random() < dt * 0.03) { p.x = Math.random() * w; p.y = Math.random() * h; }
                    }
                }
            };
        }

        /* =====================================================
           3) DOT LATTICE — springs bent by the cursor
           ===================================================== */
        function dotLattice(w, h, ctx) {
            const s = 26;
            const dots = [];
            for (let y = s; y < h - s / 2; y += s) {
                for (let x = s; x < w - s / 2; x += s) {
                    dots.push({ hx: x, hy: y, x, y, vx: 0, vy: 0 });
                }
            }
            return {
                step(dt, input) {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, w, h);
                    const R = 95;
                    const ox = tilt.x * 22, oy = tilt.y * 22;
                    for (const d of dots) {
                        /* spring back home (home shifted by tilt) */
                        d.vx += ((d.hx + ox) - d.x) * 34 * dt;
                        d.vy += ((d.hy + oy) - d.y) * 34 * dt;
                        /* cursor repels */
                        if (input.active) {
                            const dx = d.x - input.x, dy = d.y - input.y;
                            const dist = Math.hypot(dx, dy);
                            if (dist < R && dist > 0.5) {
                                const f = (1 - dist / R) * 2400 * dt;
                                d.vx += (dx / dist) * f;
                                d.vy += (dy / dist) * f;
                            }
                        }
                        const damp = Math.exp(-4.5 * dt);
                        d.vx *= damp; d.vy *= damp;
                        d.x += d.vx * dt; d.y += d.vy * dt;

                        const disp = Math.hypot(d.x - d.hx - ox, d.y - d.hy - oy);
                        const k = clamp(disp / 34, 0, 1);
                        ctx.fillStyle = `hsla(${38}, ${Math.round(k * 100)}%, ${Math.round(62 + k * 8)}%, ${0.35 + k * 0.6})`;
                        ctx.beginPath();
                        ctx.arc(d.x, d.y, 1.6 + k * 1.3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            };
        }

        /* =====================================================
           4) PARALLAX RIDGE — layered depth
           ===================================================== */
        function parallaxRidge(w, h, ctx) {
            const stars = [];
            for (let i = 0; i < 130; i++) {
                const z = 0.15 + Math.random() * 0.85;
                stars.push({ x: Math.random() * (w + 240) - 120, y: Math.random() * h * 0.75, z });
            }
            /* pre-computed ridgelines, wider than the canvas so shifting never shows edges */
            const layers = [
                { z: 0.35, base: 0.62, amp: 26, col: '#0c1322', seed: 1.7 },
                { z: 0.65, base: 0.74, amp: 34, col: '#131d33', seed: 4.2 },
                { z: 1.00, base: 0.86, amp: 40, col: '#1c2a47', seed: 8.9 }
            ];
            for (const L of layers) {
                L.pts = [];
                for (let x = -140; x <= w + 140; x += 7) {
                    const y = h * L.base
                        + Math.sin(x * 0.010 + L.seed) * L.amp
                        + Math.sin(x * 0.027 + L.seed * 2.3) * L.amp * 0.4
                        + Math.sin(x * 0.061 + L.seed * 5.1) * L.amp * 0.15;
                    L.pts.push([x, y]);
                }
            }
            const par = { x: 0, y: 0 };
            let t = 0;

            return {
                step(dt, input) {
                    t += dt;
                    /* parallax target: pointer > tilt > slow auto-drift */
                    let tx = Math.sin(t * 0.25) * 0.4, ty = Math.cos(t * 0.18) * 0.2;
                    if (tilt.active) { tx = tilt.x; ty = tilt.y * 0.6; }
                    if (input.active) {
                        tx = (input.x / w - 0.5) * 2;
                        ty = (input.y / h - 0.5) * 2;
                    }
                    par.x += (tx - par.x) * Math.min(1, dt * 3.5);
                    par.y += (ty - par.y) * Math.min(1, dt * 3.5);

                    ctx.fillStyle = '#02040a';
                    ctx.fillRect(0, 0, w, h);

                    /* moon — deepest layer, barely moves */
                    const mx = w * 0.72 - par.x * 8, my = h * 0.22 - par.y * 5;
                    const mg = ctx.createRadialGradient(mx, my, 2, mx, my, 46);
                    mg.addColorStop(0, 'rgba(255,244,214,0.95)');
                    mg.addColorStop(0.35, 'rgba(255,244,214,0.25)');
                    mg.addColorStop(1, 'rgba(255,244,214,0)');
                    ctx.fillStyle = mg;
                    ctx.beginPath();
                    ctx.arc(mx, my, 46, 0, Math.PI * 2);
                    ctx.fill();

                    /* stars, drifting slowly, parallax by depth */
                    for (const s of stars) {
                        s.x += 2.5 * s.z * dt;
                        if (s.x > w + 120) s.x = -120;
                        const px = s.x - par.x * 42 * s.z;
                        const py = s.y - par.y * 20 * s.z;
                        ctx.fillStyle = `rgba(255,255,255,${0.25 + s.z * 0.6})`;
                        ctx.fillRect(px, py, s.z > 0.7 ? 2 : 1, s.z > 0.7 ? 2 : 1);
                    }

                    /* ridgelines, nearest moves the most */
                    for (const L of layers) {
                        const sx = -par.x * 60 * L.z;
                        const sy = -par.y * 16 * L.z;
                        ctx.fillStyle = L.col;
                        ctx.beginPath();
                        ctx.moveTo(L.pts[0][0] + sx, L.pts[0][1] + sy);
                        for (const p of L.pts) ctx.lineTo(p[0] + sx, p[1] + sy);
                        ctx.lineTo(w + 150, h + 10);
                        ctx.lineTo(-150, h + 10);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
            };
        }

        /* =====================================================
           5) RIPPLE POOL — wave-equation water
           ===================================================== */
        function ripplePool(w, h, ctx) {
            const cell = 3;
            const cols = Math.max(8, Math.ceil(w / cell));
            const rows = Math.max(8, Math.ceil(h / cell));
            let curr = new Float32Array(cols * rows);
            let prev = new Float32Array(cols * rows);
            const off = document.createElement('canvas');
            off.width = cols; off.height = rows;
            const octx = off.getContext('2d');
            const img = octx.createImageData(cols, rows);
            let rain = 0;
            let lastDrop = { x: -1, y: -1 };

            function drop(cxx, cyy, strength) {
                const gx = clamp(Math.round(cxx / cell), 2, cols - 3);
                const gy = clamp(Math.round(cyy / cell), 2, rows - 3);
                for (let dy = -1; dy <= 1; dy++)
                    for (let dx = -1; dx <= 1; dx++)
                        curr[(gy + dy) * cols + (gx + dx)] += strength;
            }

            return {
                step(dt, input) {
                    /* pointer drops */
                    if (input.active && (input.x !== lastDrop.x || input.y !== lastDrop.y)) {
                        drop(input.x, input.y, input.down ? 2.4 : 1.1);
                        lastDrop.x = input.x; lastDrop.y = input.y;
                    }
                    /* occasional rain */
                    rain -= dt;
                    if (rain <= 0) {
                        drop(Math.random() * w, Math.random() * h, 1.6);
                        rain = 0.5 + Math.random() * 1.4;
                    }

                    /* wave equation, two half-steps per frame for snappier waves */
                    for (let it = 0; it < 2; it++) {
                        for (let y = 1; y < rows - 1; y++) {
                            const row = y * cols;
                            for (let x = 1; x < cols - 1; x++) {
                                const i = row + x;
                                let v = (curr[i - 1] + curr[i + 1] + curr[i - cols] + curr[i + cols]) / 2 - prev[i];
                                prev[i] = v * 0.986;
                            }
                        }
                        const tmp = curr; curr = prev; prev = tmp;
                    }

                    /* render: crests bright cyan, troughs deep blue */
                    const d = img.data;
                    for (let i = 0; i < cols * rows; i++) {
                        const v = curr[i];
                        const up = v > 0 ? v : 0;
                        const dn = v < 0 ? -v : 0;
                        const light = Math.min(255, up * 300 + dn * 40);
                        d[i * 4]     = light * 0.45;
                        d[i * 4 + 1] = light * 0.8;
                        d[i * 4 + 2] = Math.min(255, light + dn * 90 + 14);
                        d[i * 4 + 3] = 255;
                    }
                    octx.putImageData(img, 0, 0);
                    ctx.imageSmoothingEnabled = true;
                    ctx.drawImage(off, 0, 0, w, h);
                }
            };
        }

        /* =====================================================
           6) BOIDS — flock vs. cursor
           ===================================================== */
        function boids(w, h, ctx) {
            const N = 64;
            const bs = [];
            for (let i = 0; i < N; i++) {
                const a = Math.random() * Math.PI * 2;
                bs.push({
                    x: Math.random() * w, y: Math.random() * h,
                    vx: Math.cos(a) * 70, vy: Math.sin(a) * 70,
                    flee: 0
                });
            }
            return {
                step(dt, input) {
                    ctx.fillStyle = 'rgba(0,0,0,0.32)';
                    ctx.fillRect(0, 0, w, h);
                    const R = 46, R2 = R * R, P = 115;

                    for (const b of bs) {
                        let ax = 0, ay = 0;
                        let cx = 0, cy = 0, avx = 0, avy = 0, cnt = 0;
                        for (const o of bs) {
                            if (o === b) continue;
                            const dx = o.x - b.x, dy = o.y - b.y;
                            const d2 = dx * dx + dy * dy;
                            if (d2 > R2) continue;
                            const d = Math.sqrt(d2) || 0.01;
                            cnt++;
                            cx += o.x; cy += o.y;
                            avx += o.vx; avy += o.vy;
                            /* separation */
                            const f = (1 - d / R) * 620 / d;
                            ax -= dx * f * 0.016;
                            ay -= dy * f * 0.016;
                        }
                        if (cnt) {
                            /* cohesion + alignment */
                            ax += ((cx / cnt) - b.x) * 1.3;
                            ay += ((cy / cnt) - b.y) * 1.3;
                            ax += ((avx / cnt) - b.vx) * 2.0;
                            ay += ((avy / cnt) - b.vy) * 2.0;
                        }
                        /* predator cursor */
                        b.flee = Math.max(0, b.flee - dt * 2.5);
                        if (input.active) {
                            const dx = b.x - input.x, dy = b.y - input.y;
                            const d = Math.hypot(dx, dy);
                            if (d < P && d > 0.5) {
                                const f = (1 - d / P) * 2100;
                                ax += (dx / d) * f;
                                ay += (dy / d) * f;
                                b.flee = 1;
                            }
                        }
                        /* tilt = wind */
                        ax += tilt.x * 170;
                        ay += tilt.y * 170;

                        b.vx += ax * dt; b.vy += ay * dt;
                        const sp = Math.hypot(b.vx, b.vy) || 0.01;
                        const target = clamp(sp, 55, b.flee > 0 ? 230 : 130);
                        b.vx = b.vx / sp * target;
                        b.vy = b.vy / sp * target;
                        b.x += b.vx * dt; b.y += b.vy * dt;
                        if (b.x < -8) b.x = w + 7; else if (b.x > w + 8) b.x = -7;
                        if (b.y < -8) b.y = h + 7; else if (b.y > h + 8) b.y = -7;

                        /* draw as a little dart along velocity */
                        const nx = b.vx / target, ny = b.vy / target;
                        ctx.strokeStyle = b.flee > 0.15 ? '#ff9900' : 'rgba(255,255,255,0.85)';
                        ctx.lineWidth = 1.4;
                        ctx.beginPath();
                        ctx.moveTo(b.x - nx * 5 - ny * 2.4, b.y - ny * 5 + nx * 2.4);
                        ctx.lineTo(b.x + nx * 5, b.y + ny * 5);
                        ctx.lineTo(b.x - nx * 5 + ny * 2.4, b.y - ny * 5 - nx * 2.4);
                        ctx.stroke();
                    }
                }
            };
        }

        /* =====================================================
           7) ARC GAP — spark-gap arcs, ported from the
              ABB server-monitor dashboard (cpu "bolt" mode)
           ===================================================== */
        function arcGap(w, h, ctx) {
            const bolts = [];
            let acc = 0, load = 0.2, t = 0;

            const ha = (a) => Math.round(clamp(a, 0, 1) * 255).toString(16).padStart(2, '0');
            const colHex = (L) => (L < 0.6 ? '#4ade80' : L < 0.85 ? '#fbbf24' : '#f43f5e');
            const colHot = (L) => (L < 0.6 ? '#86efac' : L < 0.85 ? '#fde047' : '#fb7185');

            /* midpoint-displacement lightning path */
            function makeBolt(x0, y0, x1, y1, L, passes) {
                let pts = [[x0, y0], [x1, y1]];
                const jag = 0.42 + L * 0.5;
                for (let pass = 0; pass < (passes || 5); pass++) {
                    const next = [];
                    for (let i = 0; i < pts.length - 1; i++) {
                        const a = pts[i], b = pts[i + 1];
                        next.push(a);
                        const mx = (a[0] + b[0]) / 2, my = (a[1] + b[1]) / 2;
                        const len = Math.hypot(b[0] - a[0], b[1] - a[1]) || 1;
                        const off = (Math.random() - 0.5) * len * jag;
                        const nx = -(b[1] - a[1]) / len, ny = (b[0] - a[0]) / len;
                        next.push([mx + nx * off, my + ny * off]);
                    }
                    next.push(pts[pts.length - 1]);
                    pts = next;
                }
                return pts;
            }

            function addBranches(pts, L) {
                const branches = [];
                const nB = Math.floor(L * 3 + Math.random() * 1.5);
                for (let b = 0; b < nB; b++) {
                    const base = pts[2 + Math.floor(Math.random() * Math.max(1, pts.length - 4))];
                    const ang = (Math.random() - 0.5) * Math.PI;
                    const blen = (6 + Math.random() * 16 * (0.4 + L)) * (h / 96);
                    branches.push(makeBolt(base[0], base[1],
                        base[0] + Math.cos(ang) * blen, base[1] + Math.sin(ang) * blen, L, 3));
                }
                return branches;
            }

            function drawPath(pts, a, width, color) {
                if (a <= 0 || pts.length < 2) return;
                ctx.beginPath();
                ctx.moveTo(pts[0][0], pts[0][1]);
                for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
                ctx.strokeStyle = color + ha(a);
                ctx.lineWidth = width;
                ctx.lineJoin = 'round';
                ctx.stroke();
            }

            return {
                step(dt, input) {
                    t += dt;
                    const touches = [...input.pointers.values()];

                    /* load: idle hum, hover raises it, every extra finger cranks the voltage */
                    let target = 0.15 + 0.09 * Math.sin(t * 0.5) + 0.05 * Math.sin(t * 1.3);
                    if (input.active) target = Math.max(target, 0.55);
                    target += touches.length * 0.28;
                    if (tilt.active) target += Math.hypot(tilt.x, tilt.y) * 0.3;
                    target = clamp(target, 0, 1);
                    load += (target - load) * (1 - Math.exp(-3.2 * dt));
                    const L = clamp(load, 0, 1);
                    const col = colHex(L), hot = colHot(L);

                    ctx.clearRect(0, 0, w, h);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, w, h);

                    const exL = 10, exR = w - 10, midY = h / 2;
                    const spread = h * 0.25;

                    /* voltage field between the poles, pulses with load */
                    const field = ctx.createLinearGradient(exL, 0, exR, 0);
                    field.addColorStop(0, col + ha(0.10 + L * 0.12));
                    field.addColorStop(0.5, col + ha(0.02 + L * 0.05));
                    field.addColorStop(1, col + ha(0.10 + L * 0.12));
                    ctx.fillStyle = field;
                    ctx.fillRect(0, 0, w, h);

                    /* electrodes (only when they are the poles) */
                    if (touches.length < 2) {
                        ctx.fillStyle = col + ha(0.5);
                        ctx.fillRect(exL - 3, midY - h * 0.18, 3, h * 0.36);
                        ctx.fillRect(exR, midY - h * 0.18, 3, h * 0.36);
                    }

                    /* spawn new arcs: rate climbs steeply (quadratic) with load */
                    acc += dt * (0.5 + L * L * 24);
                    while (acc >= 1) {
                        acc -= 1;
                        const y0 = midY + (Math.random() - 0.5) * spread;
                        const y1 = midY + (Math.random() - 0.5) * spread;
                        let pts;
                        if (touches.length >= 2) {
                            /* fingers are the poles — chain the arc through all of them */
                            const ps = touches.slice().sort((a, b) => a.x - b.x);
                            pts = makeBolt(ps[0].x, ps[0].y, ps[1].x, ps[1].y, L);
                            for (let i = 1; i < ps.length - 1; i++) {
                                pts = pts.concat(makeBolt(ps[i].x, ps[i].y, ps[i + 1].x, ps[i + 1].y, L).slice(1));
                            }
                        } else if (touches.length === 1) {
                            /* one finger: electrode → finger → electrode */
                            const p = touches[0];
                            pts = makeBolt(exL, y0, p.x, p.y, L).concat(makeBolt(p.x, p.y, exR, y1, L).slice(1));
                        } else if (input.active) {
                            /* mouse hover grounds the arc on the cursor */
                            pts = makeBolt(exL, y0, input.x, input.y, L).concat(makeBolt(input.x, input.y, exR, y1, L).slice(1));
                        } else {
                            pts = makeBolt(exL, y0, exR, y1, L);
                        }
                        bolts.push({ pts, branches: addBranches(pts, L), life: 1, decay: 4 + Math.random() * 5 });
                        if (bolts.length > 40) bolts.shift();
                    }
                    /* idle spark so the gap never looks dead */
                    if (bolts.length === 0 && Math.random() < dt * 1.4) {
                        bolts.push({
                            pts: makeBolt(exL, midY + (Math.random() - 0.5) * 10, exR, midY + (Math.random() - 0.5) * 10, 0.15),
                            branches: [], life: 0.55, decay: 8
                        });
                    }

                    /* pole glow on the fingers */
                    for (const p of touches) {
                        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 22);
                        g.addColorStop(0, hot + ha(0.6));
                        g.addColorStop(1, hot + '00');
                        ctx.fillStyle = g;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    /* draw arcs: soft glow, hot core, white inner core under load */
                    for (const bolt of bolts) {
                        const a = bolt.life;
                        drawPath(bolt.pts, 0.18 * a, 4.5, col);
                        drawPath(bolt.pts, 0.9 * a, 1.4, hot);
                        drawPath(bolt.pts, 0.6 * a * L, 0.6, '#ffffff');
                        for (const br of bolt.branches) drawPath(br, 0.5 * a, 1.0, col);
                        bolt.life -= dt * bolt.decay;
                    }
                    for (let i = bolts.length - 1; i >= 0; i--) {
                        if (bolts[i].life <= 0) bolts.splice(i, 1);
                    }
                }
            };
        }

        /* =====================================================
           8) DOUBLE PENDULUM — two joints, pure chaos
           ===================================================== */
        function doublePendulum(w, h, ctx) {
            const px0 = w / 2, py0 = h * 0.3;
            const S = Math.min(w, h);
            const L1 = S * 0.21, L2 = S * 0.21;
            const g = S * 3.4;
            let a1 = Math.PI * 0.7 + Math.random() * 0.6;
            let a2 = Math.PI * 0.9 + Math.random() * 0.9;
            let w1 = 0, w2 = 0;
            const trail = [];

            function tip() {
                const x1 = px0 + Math.sin(a1) * L1, y1 = py0 + Math.cos(a1) * L1;
                return [x1, y1, x1 + Math.sin(a2) * L2, y1 + Math.cos(a2) * L2];
            }

            return {
                step(dt, input) {
                    const sub = 6, sdt = Math.min(dt, 0.033) / sub;
                    for (let s = 0; s < sub; s++) {
                        const d = a1 - a2;
                        const den = 3 - Math.cos(2 * d);
                        const acc1 = (-3 * g * Math.sin(a1) - g * Math.sin(a1 - 2 * a2)
                            - 2 * Math.sin(d) * (w2 * w2 * L2 + w1 * w1 * L1 * Math.cos(d))) / (L1 * den);
                        const acc2 = (2 * Math.sin(d) * (2 * w1 * w1 * L1 + 2 * g * Math.cos(a1)
                            + w2 * w2 * L2 * Math.cos(d))) / (L2 * den);
                        w1 += acc1 * sdt;
                        w2 += acc2 * sdt;
                        /* drag: pull the outer bob toward the pointer */
                        if (input.down && input.active) {
                            const tp = tip();
                            const fx = input.x - tp[2], fy = input.y - tp[3];
                            w1 += (fx * Math.cos(a1) - fy * Math.sin(a1)) / L1 * 14 * sdt;
                            w2 += (fx * Math.cos(a2) - fy * Math.sin(a2)) / L2 * 14 * sdt;
                            w1 *= 1 - 3 * sdt;
                            w2 *= 1 - 3 * sdt;
                        }
                        w1 *= 1 - 0.06 * sdt;
                        w2 *= 1 - 0.06 * sdt;
                        a1 += w1 * sdt;
                        a2 += w2 * sdt;
                    }
                    /* keep it alive: tiny kick once it has almost settled */
                    if (Math.abs(w1) + Math.abs(w2) < 0.4 && !input.down && Math.random() < dt * 2) {
                        w2 += (Math.random() - 0.5) * 3;
                        w1 += (Math.random() - 0.5) * 1.5;
                    }

                    const tp = tip();
                    trail.push([tp[2], tp[3]]);
                    if (trail.length > 240) trail.shift();

                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, w, h);

                    for (let i = 1; i < trail.length; i++) {
                        const k = i / trail.length;
                        ctx.strokeStyle = `rgba(182,255,46,${(k * k * 0.65).toFixed(3)})`;
                        ctx.lineWidth = 0.8 + k;
                        ctx.beginPath();
                        ctx.moveTo(trail[i - 1][0], trail[i - 1][1]);
                        ctx.lineTo(trail[i][0], trail[i][1]);
                        ctx.stroke();
                    }

                    ctx.strokeStyle = 'rgba(235,235,235,0.85)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(px0, py0);
                    ctx.lineTo(tp[0], tp[1]);
                    ctx.lineTo(tp[2], tp[3]);
                    ctx.stroke();

                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.beginPath(); ctx.arc(px0, py0, 2.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#ddd';
                    ctx.beginPath(); ctx.arc(tp[0], tp[1], 3.5, 0, Math.PI * 2); ctx.fill();
                    const gl = ctx.createRadialGradient(tp[2], tp[3], 0, tp[2], tp[3], 14);
                    gl.addColorStop(0, 'rgba(182,255,46,0.8)');
                    gl.addColorStop(1, 'rgba(182,255,46,0)');
                    ctx.fillStyle = gl;
                    ctx.beginPath(); ctx.arc(tp[2], tp[3], 14, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = ACC.lime;
                    ctx.beginPath(); ctx.arc(tp[2], tp[3], 4.2, 0, Math.PI * 2); ctx.fill();
                }
            };
        }

        /* =====================================================
           9) KINEFX IK — fabrik chain chasing a target
           ===================================================== */
        function ikChain(w, h, ctx) {
            const n = 12;
            const S = Math.min(w, h);
            const seg = S * 0.085;
            const root = { x: w / 2, y: h * 0.94 };
            const pts = [];
            for (let i = 0; i < n; i++) pts.push({ x: root.x, y: root.y - i * seg });
            const tgt = { x: w / 2, y: h / 2 };
            let t = 0;

            return {
                step(dt, input) {
                    t += dt;
                    let tx, ty;
                    if (input.active) { tx = input.x; ty = input.y; }
                    else {
                        tx = w / 2 + Math.sin(t * 0.6) * w * 0.32 + Math.sin(t * 1.7) * w * 0.06;
                        ty = h * 0.42 + Math.sin(t * 0.83 + 1.4) * h * 0.26;
                    }
                    tgt.x += (tx - tgt.x) * Math.min(1, dt * 6);
                    tgt.y += (ty - tgt.y) * Math.min(1, dt * 6);

                    /* FABRIK: backward from target, forward from root */
                    for (let it = 0; it < 8; it++) {
                        pts[n - 1].x = tgt.x; pts[n - 1].y = tgt.y;
                        for (let i = n - 2; i >= 0; i--) {
                            const dx = pts[i].x - pts[i + 1].x, dy = pts[i].y - pts[i + 1].y;
                            const d = Math.hypot(dx, dy) || 1;
                            pts[i].x = pts[i + 1].x + dx / d * seg;
                            pts[i].y = pts[i + 1].y + dy / d * seg;
                        }
                        pts[0].x = root.x; pts[0].y = root.y;
                        for (let i = 1; i < n; i++) {
                            const dx = pts[i].x - pts[i - 1].x, dy = pts[i].y - pts[i - 1].y;
                            const d = Math.hypot(dx, dy) || 1;
                            pts[i].x = pts[i - 1].x + dx / d * seg;
                            pts[i].y = pts[i - 1].y + dy / d * seg;
                        }
                    }

                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, w, h);

                    /* base plate */
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(root.x - 26, root.y + 6);
                    ctx.lineTo(root.x + 26, root.y + 6);
                    ctx.stroke();

                    /* bones */
                    for (let i = 1; i < n; i++) {
                        const k = i / (n - 1);
                        ctx.strokeStyle = `rgba(225,225,225,${(0.75 - k * 0.25).toFixed(3)})`;
                        ctx.lineWidth = 4.5 - k * 3.2;
                        ctx.beginPath();
                        ctx.moveTo(pts[i - 1].x, pts[i - 1].y);
                        ctx.lineTo(pts[i].x, pts[i].y);
                        ctx.stroke();
                    }
                    /* joints */
                    ctx.lineWidth = 1;
                    for (let i = 0; i < n - 1; i++) {
                        ctx.fillStyle = '#0a0a0a';
                        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
                        ctx.beginPath();
                        ctx.arc(pts[i].x, pts[i].y, 3.4 - (i / n) * 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    }
                    /* effector */
                    const e = pts[n - 1];
                    const gl = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, 13);
                    gl.addColorStop(0, 'rgba(255,122,24,0.7)');
                    gl.addColorStop(1, 'rgba(255,122,24,0)');
                    ctx.fillStyle = gl;
                    ctx.beginPath(); ctx.arc(e.x, e.y, 13, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = ACC.orange;
                    ctx.beginPath(); ctx.arc(e.x, e.y, 3.6, 0, Math.PI * 2); ctx.fill();
                    /* target crosshair */
                    ctx.strokeStyle = 'rgba(255,122,24,0.4)';
                    ctx.beginPath(); ctx.arc(tgt.x, tgt.y, 9, 0, Math.PI * 2); ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(tgt.x - 13, tgt.y); ctx.lineTo(tgt.x - 5, tgt.y);
                    ctx.moveTo(tgt.x + 5, tgt.y);  ctx.lineTo(tgt.x + 13, tgt.y);
                    ctx.moveTo(tgt.x, tgt.y - 13); ctx.lineTo(tgt.x, tgt.y - 5);
                    ctx.moveTo(tgt.x, tgt.y + 5);  ctx.lineTo(tgt.x, tgt.y + 13);
                    ctx.stroke();
                }
            };
        }

        /* =====================================================
           10) RBD WALL — blast a brick wall apart
           ===================================================== */
        function rbdWall(w, h, ctx) {
            const S = Math.min(w, h);
            const floorY = h - 6;
            const bw = S * 0.115, bh = bw * 0.48;
            let bricks = [];
            let rebuildT = 0, autoT = 2.5, flash = null, wasDown = false;

            function build() {
                bricks = [];
                const rowsN = Math.min(9, Math.floor(h * 0.52 / bh));
                const colsN = 5;
                const x0 = w / 2 - colsN * bw / 2;
                for (let r = 0; r < rowsN; r++) {
                    const off = (r % 2) * bw * 0.5 - bw * 0.25;
                    for (let c = 0; c < colsN; c++) {
                        bricks.push({
                            x: x0 + off + c * bw + bw / 2,
                            y: floorY - r * bh - bh / 2,
                            a: 0, vx: 0, vy: 0, va: 0,
                            dyn: false
                        });
                    }
                }
            }
            build();

            function blast(bx, by) {
                flash = { x: bx, y: by, r: 2, a: 1 };
                const R = S * 0.5;
                for (const b of bricks) {
                    const dx = b.x - bx, dy = b.y - by;
                    const d = Math.hypot(dx, dy) || 1;
                    if (d < R) {
                        const f = 1 - d / R;
                        b.dyn = true;
                        b.vx += dx / d * f * S * 2.4 + (Math.random() - 0.5) * S * 0.3;
                        b.vy += dy / d * f * S * 2.4 - f * S * 0.6;
                        b.va += (Math.random() - 0.5) * 16 * f;
                    }
                }
                rebuildT = 0;
            }

            return {
                step(dt, input) {
                    if (input.down && !wasDown && input.active) { blast(input.x, input.y); autoT = 8; }
                    wasDown = input.down;
                    autoT -= dt;
                    if (autoT <= 0) {
                        if (!bricks.some(b => b.dyn)) {
                            blast(w * (0.35 + Math.random() * 0.3), h * (0.35 + Math.random() * 0.3));
                        }
                        autoT = 6 + Math.random() * 4;
                    }

                    let moving = false, anyDyn = false;
                    for (const b of bricks) {
                        if (!b.dyn) continue;
                        anyDyn = true;
                        b.vy += S * 3 * dt;
                        b.vx += tilt.x * S * 0.5 * dt;
                        b.vx *= 1 - 0.15 * dt;
                        b.x += b.vx * dt;
                        b.y += b.vy * dt;
                        b.a += b.va * dt;
                        const ext = bh * 0.5 + Math.abs(Math.sin(b.a * 2)) * (bw - bh) * 0.25;
                        if (b.y + ext > floorY) {
                            b.y = floorY - ext;
                            b.vy *= -0.28;
                            if (Math.abs(b.vy) < S * 0.06) b.vy = 0;
                            b.vx *= 0.8;
                            b.va *= 0.75;
                        }
                        if (b.x < bw * 0.5) { b.x = bw * 0.5; b.vx = Math.abs(b.vx) * 0.4; }
                        if (b.x > w - bw * 0.5) { b.x = w - bw * 0.5; b.vx = -Math.abs(b.vx) * 0.4; }
                        if (Math.abs(b.vx) + Math.abs(b.vy) + Math.abs(b.va) * 30 > S * 0.05) moving = true;
                    }
                    /* crude pairwise separation so the rubble piles up */
                    const rr = bw * 0.55;
                    for (let i = 0; i < bricks.length; i++) {
                        const a = bricks[i];
                        if (!a.dyn) continue;
                        for (let j = 0; j < bricks.length; j++) {
                            if (i === j) continue;
                            const c = bricks[j];
                            const dx = c.x - a.x, dy = c.y - a.y;
                            const d2 = dx * dx + dy * dy;
                            if (d2 > rr * rr || d2 < 0.01) continue;
                            const d = Math.sqrt(d2);
                            const push = (rr - d) * (c.dyn ? 0.25 : 0.5);
                            a.x -= dx / d * push;
                            a.y -= dy / d * push;
                        }
                    }
                    if (anyDyn && !moving) {
                        rebuildT += dt;
                        if (rebuildT > 2.4) build();
                    } else {
                        rebuildT = 0;
                    }

                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, w, h);
                    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(0, floorY + 1);
                    ctx.lineTo(w, floorY + 1);
                    ctx.stroke();

                    for (const b of bricks) {
                        const busy = b.dyn && (Math.abs(b.vx) + Math.abs(b.vy)) > S * 0.12;
                        ctx.save();
                        ctx.translate(b.x, b.y);
                        ctx.rotate(b.a);
                        ctx.fillStyle = b.dyn ? '#232326' : '#1b1b1e';
                        ctx.strokeStyle = busy ? ACC.red : 'rgba(255,255,255,0.20)';
                        ctx.beginPath();
                        ctx.rect(-bw / 2 + 0.5, -bh / 2 + 0.5, bw - 1, bh - 1);
                        ctx.fill();
                        ctx.stroke();
                        ctx.restore();
                    }

                    if (flash) {
                        flash.r += S * 3 * dt;
                        flash.a -= 3 * dt;
                        if (flash.a <= 0) flash = null;
                        else {
                            ctx.strokeStyle = `rgba(255,122,24,${flash.a.toFixed(3)})`;
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.arc(flash.x, flash.y, flash.r, 0, Math.PI * 2);
                            ctx.stroke();
                        }
                    }
                }
            };
        }

        /* =====================================================
           11) SOFTBODY — pressure blob on a floor
           ===================================================== */
        function softBody(w, h, ctx) {
            const N = 26;
            const S = Math.min(w, h);
            const r0 = S * 0.2;
            const cx0 = w / 2, cy0 = h * 0.35;
            const pts = [];
            for (let i = 0; i < N; i++) {
                const a = i / N * Math.PI * 2;
                const x = cx0 + Math.cos(a) * r0, y = cy0 + Math.sin(a) * r0;
                pts.push({ x, y, px: x, py: y });
            }
            const rest1 = 2 * r0 * Math.sin(Math.PI / N);
            const rest2 = 2 * r0 * Math.sin(2 * Math.PI / N);
            const A0 = Math.PI * r0 * r0;

            function area() {
                let a = 0;
                for (let i = 0; i < N; i++) {
                    const p = pts[i], q = pts[(i + 1) % N];
                    a += p.x * q.y - q.x * p.y;
                }
                return Math.abs(a / 2);
            }

            function link(i, j, rest) {
                const A = pts[i], B = pts[j];
                const dx = B.x - A.x, dy = B.y - A.y;
                const d = Math.hypot(dx, dy) || 1e-4;
                const diff = (d - rest) / d * 0.5;
                A.x += dx * diff; A.y += dy * diff;
                B.x -= dx * diff; B.y -= dy * diff;
            }

            function collide(p) {
                const m = 5;
                if (p.y > h - m) { p.y = h - m; p.px += (p.x - p.px) * 0.2; }
                if (p.y < m) p.y = m;
                if (p.x > w - m) p.x = w - m;
                if (p.x < m) p.x = m;
            }

            return {
                step(dt, input) {
                    const sub = 3, sdt = Math.min(dt, 0.033) / sub;
                    for (let s = 0; s < sub; s++) {
                        let mx = 0, my = 0;
                        for (const p of pts) { mx += p.x; my += p.y; }
                        mx /= N; my /= N;
                        const press = clamp((A0 - area()) / A0, -0.5, 0.8) * 3800;

                        for (const p of pts) {
                            let ax = tilt.x * 260;
                            let ay = S * 1.4 + tilt.y * 260;
                            const dx = p.x - mx, dy = p.y - my;
                            const d = Math.hypot(dx, dy) || 1;
                            ax += dx / d * press;
                            ay += dy / d * press;
                            if (input.active) {
                                const qx = p.x - input.x, qy = p.y - input.y;
                                const qd = Math.hypot(qx, qy);
                                const R = S * 0.22;
                                if (qd < R && qd > 0.5) {
                                    const f = (1 - qd / R) * 5200;
                                    ax += qx / qd * f;
                                    ay += qy / qd * f;
                                }
                            }
                            const nx = p.x + (p.x - p.px) * 0.985 + ax * sdt * sdt;
                            const ny = p.y + (p.y - p.py) * 0.985 + ay * sdt * sdt;
                            p.px = p.x; p.py = p.y;
                            p.x = nx; p.y = ny;
                        }
                        for (let it = 0; it < 3; it++) {
                            for (let i = 0; i < N; i++) {
                                link(i, (i + 1) % N, rest1);
                                link(i, (i + 2) % N, rest2);
                            }
                            for (const p of pts) collide(p);
                        }
                    }

                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, w, h);
                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(0, h - 4.5);
                    ctx.lineTo(w, h - 4.5);
                    ctx.stroke();

                    /* smooth outline through the midpoints */
                    ctx.beginPath();
                    let a0 = pts[N - 1], b0 = pts[0];
                    ctx.moveTo((a0.x + b0.x) / 2, (a0.y + b0.y) / 2);
                    for (let i = 0; i < N; i++) {
                        const a = pts[i], b = pts[(i + 1) % N];
                        ctx.quadraticCurveTo(a.x, a.y, (a.x + b.x) / 2, (a.y + b.y) / 2);
                    }
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(139,92,246,0.10)';
                    ctx.fill();
                    ctx.strokeStyle = ACC.violet;
                    ctx.lineWidth = 1.8;
                    ctx.stroke();

                    /* nucleus */
                    let mx = 0, my = 0;
                    for (const p of pts) { mx += p.x; my += p.y; }
                    mx /= N; my /= N;
                    ctx.fillStyle = 'rgba(139,92,246,0.55)';
                    ctx.beginPath();
                    ctx.arc(mx, my, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            };
        }

        /* =====================================================
           12) VELLUM CLOTH — tearable pinned cloth
           ===================================================== */
        function vellumCloth(w, h, ctx) {
            const cols = 24, rows = 15;
            const sx = w * 0.86 / (cols - 1);
            const sy = h * 0.62 / (rows - 1);
            const x0 = w * 0.07, y0 = h * 0.08;
            let pts, cons, rebuildT = 0, t = 0;

            function build() {
                pts = [];
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const x = x0 + c * sx, y = y0 + r * sy;
                        pts.push({ x, y, px: x, py: y, pin: r === 0 && c % 2 === 0 });
                    }
                }
                cons = [];
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const i = r * cols + c;
                        if (c < cols - 1) cons.push({ a: i, b: i + 1, rest: sx, on: true, str: 1 });
                        if (r < rows - 1) cons.push({ a: i, b: i + cols, rest: sy, on: true, str: 1 });
                    }
                }
            }
            build();

            return {
                step(dt, input) {
                    t += dt;
                    const sdt = Math.min(dt, 0.03);
                    const wind = Math.sin(t * 0.7) * 30 + Math.sin(t * 2.3) * 18 + tilt.x * 90;
                    for (const p of pts) {
                        if (p.pin) continue;
                        const ax = wind + Math.sin(t * 1.3 + p.y * 0.02) * 22;
                        const ay = 620 + tilt.y * 120;
                        const nx = p.x + (p.x - p.px) * 0.988 + ax * sdt * sdt;
                        const ny = p.y + (p.y - p.py) * 0.988 + ay * sdt * sdt;
                        p.px = p.x; p.py = p.y;
                        p.x = nx; p.y = ny;
                    }
                    /* drag pulls nearby points along */
                    if (input.active && input.down) {
                        for (const p of pts) {
                            if (p.pin) continue;
                            const dx = input.x - p.x, dy = input.y - p.y;
                            if (Math.hypot(dx, dy) < 46) {
                                p.x += dx * 0.28;
                                p.y += dy * 0.28;
                            }
                        }
                    }
                    let torn = 0;
                    for (let it = 0; it < 3; it++) {
                        for (const c of cons) {
                            if (!c.on) continue;
                            const A = pts[c.a], B = pts[c.b];
                            const dx = B.x - A.x, dy = B.y - A.y;
                            const d = Math.hypot(dx, dy) || 1e-4;
                            c.str = d / c.rest;
                            if (c.str > 2.4) { c.on = false; continue; }
                            const diff = (d - c.rest) / d * 0.5;
                            if (A.pin && B.pin) continue;
                            if (A.pin) { B.x -= dx * diff * 2; B.y -= dy * diff * 2; }
                            else if (B.pin) { A.x += dx * diff * 2; A.y += dy * diff * 2; }
                            else {
                                A.x += dx * diff; A.y += dy * diff;
                                B.x -= dx * diff; B.y -= dy * diff;
                            }
                        }
                    }
                    for (const c of cons) { if (!c.on) torn++; }
                    if (torn / cons.length > 0.32) {
                        rebuildT += dt;
                        if (rebuildT > 2.5) { build(); rebuildT = 0; }
                    }

                    ctx.fillStyle = '#050505';
                    ctx.fillRect(0, 0, w, h);
                    ctx.lineWidth = 1;
                    for (const c of cons) {
                        if (!c.on) continue;
                        const A = pts[c.a], B = pts[c.b];
                        const s = clamp((c.str - 1.15), 0, 1);
                        ctx.strokeStyle = s > 0.02
                            ? `rgba(255,210,31,${(0.25 + s * 0.75).toFixed(3)})`
                            : 'rgba(230,230,230,0.30)';
                        ctx.beginPath();
                        ctx.moveTo(A.x, A.y);
                        ctx.lineTo(B.x, B.y);
                        ctx.stroke();
                    }
                    /* pins */
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    for (const p of pts) {
                        if (p.pin) ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
                    }
                }
            };
        }

        /* =====================================================
           13) LAVA — metaball melt pool
           ===================================================== */
        function lavaLamp(w, h, ctx) {
            const cw = 96;
            const ch2 = Math.max(48, Math.round(cw * h / Math.max(1, w)));
            const off = document.createElement('canvas');
            off.width = cw; off.height = ch2;
            const octx = off.getContext('2d');
            const img = octx.createImageData(cw, ch2);
            const blobs = [];
            for (let i = 0; i < 7; i++) {
                blobs.push({
                    x: cw * (0.12 + Math.random() * 0.76),
                    y: ch2 * (0.55 + Math.random() * 0.4),
                    r: cw * (0.06 + Math.random() * 0.05),
                    vx: 0, vy: 0,
                    heat: Math.random() * 0.5
                });
            }
            let t = 0;

            return {
                step(dt, input) {
                    t += dt;
                    for (const b of blobs) {
                        /* hot near the bottom pool, cooling on the way up */
                        b.heat = clamp(b.heat + (b.y / ch2 - 0.55) * 0.5 * dt, 0, 1);
                        b.vy += (0.55 - b.heat) * cw * 0.5 * dt;
                        b.vx += (Math.sin(t * 0.4 + b.r * 31) * 0.03 + tilt.x * 0.15) * cw * dt;
                        if (input.active) {
                            const pxc = input.x / w * cw, pyc = input.y / h * ch2;
                            const dx = b.x - pxc, dy = b.y - pyc;
                            const d = Math.hypot(dx, dy);
                            if (d < cw * 0.35) {
                                b.heat = clamp(b.heat + (1 - d / (cw * 0.35)) * dt * 1.6, 0, 1);
                                if (d > 0.5) {
                                    const f = (1 - d / (cw * 0.35)) * cw * 0.5 * dt;
                                    b.vx += dx / d * f;
                                    b.vy += dy / d * f;
                                }
                            }
                        }
                        b.vx *= 1 - 1.0 * dt;
                        b.vy *= 1 - 1.0 * dt;
                        b.x += b.vx * dt;
                        b.y += b.vy * dt;
                        if (b.x < b.r * 0.6) { b.x = b.r * 0.6; b.vx = Math.abs(b.vx) * 0.5; }
                        if (b.x > cw - b.r * 0.6) { b.x = cw - b.r * 0.6; b.vx = -Math.abs(b.vx) * 0.5; }
                        if (b.y < b.r * 0.7) { b.y = b.r * 0.7; b.vy = Math.abs(b.vy) * 0.3; }
                        if (b.y > ch2 - b.r * 0.3) { b.y = ch2 - b.r * 0.3; b.vy = -Math.abs(b.vy) * 0.3; }
                    }

                    const data = img.data;
                    let i4 = 0;
                    for (let y = 0; y < ch2; y++) {
                        const pool = Math.exp((y - ch2) / 5) * 2.4;
                        for (let x = 0; x < cw; x++, i4 += 4) {
                            let v = pool, heat = pool * 0.85;
                            for (const b of blobs) {
                                const dx = x - b.x, dy = y - b.y;
                                const q = b.r * b.r / (dx * dx + dy * dy + 1);
                                v += q;
                                heat += q * b.heat;
                            }
                            let r, gg, bb;
                            if (v > 0.8) {
                                const hn = clamp(heat / v, 0, 1);
                                const m = clamp(hn * 0.62 + clamp((v - 0.8) * 0.22, 0, 0.18), 0, 1);
                                if (m < 0.62) {
                                    const u = m / 0.62;
                                    r = 96 + u * 140; gg = 12 + u * 66; bb = 28 - u * 8;
                                } else {
                                    const u = (m - 0.62) / 0.38;
                                    r = 236 + u * 19; gg = 78 + u * 90; bb = 20 + u * 8;
                                }
                            } else {
                                const u = v / 0.8;
                                r = 6 + u * 60; gg = 4 + u * 6; bb = 5 + u * 8;
                            }
                            data[i4] = r; data[i4 + 1] = gg; data[i4 + 2] = bb; data[i4 + 3] = 255;
                        }
                    }
                    octx.putImageData(img, 0, 0);
                    ctx.imageSmoothingEnabled = true;
                    ctx.drawImage(off, 0, 0, w, h);
                }
            };
        }

        /* =====================================================
           14) WAX — a flame melting a wax surface
           ===================================================== */
        function meltingWax(w, h, ctx) {
            const n = Math.max(48, Math.floor(w / 3));
            const cwx = w / (n - 1);
            const hgt = new Float32Array(n);
            const heat = new Float32Array(n);
            for (let i = 0; i < n; i++) {
                hgt[i] = h * (0.40 + 0.05 * Math.sin(i * 0.09) + 0.02 * Math.sin(i * 0.31 + 2));
            }
            let t = 0, fx = w / 2;

            return {
                step(dt, input) {
                    t += dt;
                    const targetX = input.active
                        ? input.x
                        : w / 2 + Math.sin(t * 0.33) * w * 0.36 + Math.sin(t * 1.02) * w * 0.07;
                    fx += (targetX - fx) * Math.min(1, dt * 3);
                    const fi = clamp(Math.round(fx / cwx), 0, n - 1);

                    for (let i = 0; i < n; i++) {
                        const dd = (i - fi) * cwx / (w * 0.06);
                        heat[i] = clamp(heat[i] + Math.exp(-dd * dd) * 1.8 * dt - heat[i] * 0.5 * dt, 0, 1);
                    }
                    for (let i = 1; i < n - 1; i++) {
                        heat[i] += (heat[i - 1] + heat[i + 1] - 2 * heat[i]) * 3 * dt;
                    }
                    /* molten wax levels out, cool wax barely flows */
                    for (let pass = 0; pass < 2; pass++) {
                        for (let i = 0; i < n - 1; i++) {
                            const m = (heat[i] + heat[i + 1]) * 0.5;
                            const k = clamp(m * m * 8 * dt, 0, 0.24);
